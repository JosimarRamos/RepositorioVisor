<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- FASE 2: Bloqueo de zoom nativo a nivel de viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visor Geofísico Bidimensional / Tridimensional</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-bg: #1e1e1e;
            --panel-bg: #2a2a2a;
            --border-color: #3a3a3a;
            --text-color: #e0e0e0;
            --accent-color: #29b6f6;
            --accent-hover: #039be5;
            --danger-color: #ff5252;
            --sidebar-width: 320px;
        }
        
        body { margin: 0; overflow: hidden; background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text-color); }
        #main-wrapper { display: flex; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: width 0.3s ease; position: relative; z-index: 20; flex-shrink: 0; }
        #sidebar.collapsed { width: 0; border-right: none; }
        #sidebar-content { padding: 20px; padding-top: 60px; overflow-y: auto; flex-grow: 1; width: var(--sidebar-width); box-sizing: border-box; transition: opacity 0.2s ease; }
        #sidebar.collapsed #sidebar-content { opacity: 0; pointer-events: none; }

        #toggle-sidebar { position: absolute; top: 15px; right: -42px; width: 42px; height: 42px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-left: none; border-radius: 0 8px 8px 0; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 21; box-shadow: 4px 0 10px rgba(0,0,0,0.3); font-size: 20px; transition: color 0.2s, background 0.2s; }
        #toggle-sidebar:hover { color: var(--accent-color); }

        #views-container { display: flex; flex-grow: 1; width: 0; flex-direction: row; }
        .viewport { position: relative; flex: 1; height: 100%; box-sizing: border-box; min-height: 0; min-width: 0; }
        
        #view-3d { border-right: 2px solid var(--border-color); }
        #view-2d { background-color: #0b0b0b; display: flex; flex-direction: column; transition: flex 0.3s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease; position: relative; }
        
        #canvas-3d { width: 100%; height: 100%; }
        
        /* FASE 2: Bloqueo de gestos por defecto para evitar zoom global */
        #canvas-2d { flex-grow: 1; width: 100%; height: 100%; display: block; background-color: #0a0a0a; cursor: grab; outline: none; touch-action: none; }
        #canvas-2d:active { cursor: grabbing; }
        
        .accordion-item { margin-bottom: 12px; }
        .accordion-header { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; transition: background 0.2s, border-radius 0.2s; user-select: none; }
        .accordion-header:hover { background: #333333; }
        .accordion-header.active { border-radius: 8px 8px 0 0; border-bottom: none; }
        .accordion-title { display: flex; align-items: center; gap: 10px; }
        .accordion-icon { font-size: 16px; }
        .chevron { transition: transform 0.3s; font-size: 12px; color: #aaa; }
        .accordion-header.active .chevron { transform: rotate(180deg); }
        .accordion-content { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 8px 8px; padding: 15px; display: none; }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .setting-label { font-size: 13px; color: #ccc; }
        
        .switch { position: relative; display: inline-block; width: 42px; height: 24px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(18px); }

        .color-picker-container { display: flex; border: 1px solid #444; border-radius: 6px; overflow: hidden; background: #222; }
        .color-hex { padding: 4px 8px; font-size: 12px; font-family: monospace; border-right: 1px solid #444; display: flex; align-items: center; color: #aaa; letter-spacing: 0.5px;}
        input[type="color"] { border: none; width: 34px; height: 32px; padding: 0; background: transparent; cursor: pointer; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 4px; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

        input[type="range"] { background: #222; border: 1px solid #444; color: white; border-radius: 4px; padding: 6px; font-size: 12px; accent-color: var(--accent-color); }

        .z-input-container { position: relative; margin-top: 10px; }
        .z-input-container label { position: absolute; top: -8px; left: 10px; background: var(--panel-bg); padding: 0 5px; font-size: 11px; color: #888; border-radius: 4px;}
        .z-input-container input { width: 100%; box-sizing: border-box; background: transparent; padding: 12px 10px; border: 1px solid #444; border-radius: 6px; color: white; font-size: 13px; outline: none;}
        .z-input-container input:focus { border-color: var(--accent-color); }

        .file-drop-zone { border: 1px dashed #555; border-radius: 8px; padding: 15px; text-align: center; background: rgba(0, 0, 0, 0.2); cursor: pointer; transition: all 0.3s ease; font-size: 12px; color: #bbb; }
        .file-drop-zone:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(41, 182, 246, 0.05); }
        .file-input { display: none; }
        
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.05); padding: 10px; margin-bottom: 8px; border-radius: 6px; font-size: 12px; border-left: 3px solid #555; transition: border-color 0.3s; }
        .layer-item.active-2d { background: rgba(41, 182, 246, 0.1); border-left-color: var(--accent-color); border-right: 2px solid var(--accent-color); }
        .layer-actions { display: flex; gap: 10px; align-items: center; }
        
        .btn-action { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px; opacity: 0.8; transition: opacity 0.2s; }
        .btn-action:hover { opacity: 1; }
        
        #view-2d-header { background-color: #1a1a1a; border-bottom: 1px solid var(--border-color); padding: 10px 20px; font-size: 13px; font-weight: bold; color: #ccc; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        
        /* FASE 2: Buscador Simplificado Izquierdo */
        .search-prog-container { display: flex; align-items: center; background: #111; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; margin-left: 10px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
        #search-progressive { background: transparent; border: none; color: var(--accent-color); padding: 5px 10px; font-size: 13px; width: 100px; text-align: center; outline: none; font-family: monospace; font-weight: bold; }
        #search-progressive::placeholder { color: #555; font-family: 'Segoe UI', sans-serif; font-weight: normal; }

        .header-title-text { font-size: 13px; font-weight: bold; color: white; }

        #btn-toggle-2d { background: none; border: none; color: var(--accent-color); cursor: pointer; font-size: 14px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: transform 0.3s ease, background 0.2s; }
        #btn-toggle-2d:hover { background: rgba(41, 182, 246, 0.2); }

        #toggle-2d-sidebar { position: absolute; top: 50%; right: 0; transform: translateY(-50%); width: 24px; height: 60px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-right: none; border-radius: 8px 0 0 8px; color: var(--text-color); cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 21; box-shadow: -4px 0 10px rgba(0,0,0,0.3); }
        #toggle-2d-sidebar:hover { color: var(--accent-color); }

        .btn-profile-nav { background: rgba(255, 255, 255, 0.08); border: 1px solid #444; color: var(--text-color); border-radius: 4px; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: background 0.2s, color 0.2s; user-select: none; }
        .btn-profile-nav:hover { background: var(--accent-color); color: #000; border-color: var(--accent-color); }

        #tooltip-2d { position: absolute; background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 6px; pointer-events: none; font-family: 'Segoe UI', sans-serif; display: none; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        #laser-info { position: absolute; bottom: 25px; right: 25px; background: rgba(20, 20, 20, 0.95); border: 1px solid var(--border-color); padding: 12px 15px; border-radius: 8px; display: none; font-size: 13px; line-height: 1.4; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); pointer-events: none; max-width: 240px; }
        #laser-info span.val { color: #81c784; font-weight: bold; }

        #dpad-container { position: absolute; bottom: 25px; left: 25px; display: none; flex-direction: column; align-items: center; gap: 4px; background: rgba(15, 15, 15, 0.85); padding: 12px; border-radius: 50px; border: 1px solid #444; z-index: 100; user-select: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .dpad-row { display: flex; gap: 4px; }
        .dpad-btn { width: 34px; height: 34px; border-radius: 50%; background: #252525; color: var(--text-color); border: 1px solid #555; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .dpad-btn:hover { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }
        .dpad-btn:active { transform: scale(0.9); }
        #btn-center { font-size: 16px; background: #1a1a1a; color: var(--danger-color); }
        #btn-center:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); }
        
        #zoom-controls-2d { position: absolute; top: 60px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 101; }
        .zoom-btn { width: 36px; height: 36px; border-radius: 6px; background: rgba(20, 20, 20, 0.85); color: var(--text-color); border: 1px solid var(--border-color); font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; backdrop-filter: blur(4px); user-select: none; }
        .zoom-btn:hover { background: var(--accent-color); color: #000; border-color: var(--accent-color); }
        
        /* Botón de Restaurar Vista Destacado */
        #btn-zoom-reset { background: rgba(255, 183, 77, 0.15); color: #ffb74d; border-color: #ffb74d; font-size: 18px; }
        #btn-zoom-reset:hover { background: #ffb74d; color: #000; border-color: #ffb74d; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        @media (min-width: 769px) {
            #btn-toggle-2d { transform: rotate(-90deg); }
            #main-wrapper.is-2d-collapsed #view-2d { flex: 0 0 0px !important; width: 0px !important; opacity: 0; overflow: hidden; border-left: none; }
            #main-wrapper.is-2d-collapsed #toggle-2d-sidebar { display: flex; }
        }

        @media (max-width: 768px) {
            #views-container { flex-direction: column; }
            #view-3d { border-right: none; border-bottom: 2px solid var(--border-color); }
            #sidebar { position: absolute; height: 100vh; left: 0; top: 0; max-width: 85vw; z-index: 1000; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
            #sidebar.collapsed { width: 0; border-right: none; box-shadow: none; }
            #sidebar-content { padding-bottom: 120px !important; }
            #btn-toggle-2d { transform: rotate(0deg); }
            #main-wrapper.is-2d-collapsed #view-2d { flex: 0 0 44px !important; height: 44px !important; overflow: hidden; }
            #main-wrapper.is-2d-collapsed #btn-toggle-2d { transform: rotate(180deg); }
            
            #view-2d-header { padding: 10px 8px; font-size: 11px; }
            .header-title-text { display: none; } 
            .search-prog-container { margin-left: 0; }
            #search-progressive { width: 70px; font-size: 11px; }
            
            #active-profile-title { max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
            
            /* D-Pad visible en móvil para micro-ajustes */
            #dpad-container { display: flex; transform: scale(0.85); transform-origin: bottom left; bottom: 15px; left: 15px; padding: 8px; }
            
            #laser-info { bottom: 25px; right: 15px; padding: 10px 12px; font-size: 11px; max-width: 150px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); border-radius: 6px; }
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="main-wrapper">
        <div id="sidebar" class="collapsed">
            <div id="toggle-sidebar" title="Ocultar/Mostrar panel">☰</div>
            
            <div id="sidebar-content">
                <h1 style="border:none; margin-bottom: 15px; font-size:16px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; margin-top:0;">Visor Geofísico</h1>
                
                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)">
                        <div class="accordion-title"><span class="accordion-icon">🗄️</span> 1. IMPORTAR DATOS</div>
                        <span class="chevron">▲</span>
                    </div>
                    <div class="accordion-content" style="display: block;">
                        <div class="file-drop-zone" onclick="document.getElementById('file-loader').click()">
                            <span id="drop-text">Cargar JSON (Terreno/Perfil) o TXT (Progresivas)</span>
                            <input type="file" id="file-loader" class="file-input" accept=".json, .txt" multiple>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <div class="accordion-header active" onclick="toggleAccordion(this)">
                        <div class="accordion-title"><span class="accordion-icon">⚙️</span> 2. AJUSTES DE TERRENO</div>
                        <span class="chevron">▲</span>
                    </div>
                    <div class="accordion-content" style="display: block;">
                        <div class="setting-row">
                            <span class="setting-label">Mostrar Terreno</span>
                            <label class="switch">
                                <input type="checkbox" id="chk-terreno" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">Cortinas Transparentes</span>
                            <label class="switch">
                                <input type="checkbox" id="chk-cortinas" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="setting-row">
                            <span class="setting-label">Color Base</span>
                            <div class="color-picker-container">
                                <span class="color-hex" id="hex-terreno">#304120</span>
                                <input type="color" id="color-terreno" value="#304120">
                            </div>
                        </div>
                        <div class="setting-row" style="margin-bottom: 25px;">
                            <span class="setting-label">Opacidad</span>
                            <input type="range" id="opacity-terreno" min="0" max="1" step="0.05" value="0.70" style="width: 50%;">
                        </div>
                        
                        <div class="z-input-container">
                            <label>Recorte Altura (Z)</label>
                            <input type="number" id="z-limit-input" value="3000" step="10">
                        </div>
                    </div>
                </div>

                <div class="accordion-item" style="flex-grow: 1; display: flex; flex-direction: column;">
                    <div class="accordion-header active" onclick="toggleAccordion(this)">
                        <div class="accordion-title"><span class="accordion-icon">🗺️</span> 3. CAPAS ACTIVAS</div>
                        <span class="chevron">▲</span>
                    </div>
                    <div class="accordion-content" style="display: block; flex-grow: 1; padding: 10px;">
                        <div id="lista-capas">
                            <div id="empty-list-msg" style="font-size: 12px; color: #555; text-align: center; padding: 15px; border: 1px dashed #333; border-radius: 6px;">Ningún archivo cargado</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="views-container">
            <div id="view-3d" class="viewport">
                <div id="canvas-3d"></div>
            </div>

            <div id="toggle-2d-sidebar" title="Mostrar Vista 2D">▶</div>

            <div id="view-2d" class="viewport">
                <div id="view-2d-header">
                    <div style="display:flex; align-items:center;">
                        <button id="btn-toggle-2d" title="Ocultar/Mostrar panel 2D">▼</button>
                        <span class="header-title-text" style="margin-left:8px;">2D</span>
                        
                        <!-- FASE 2: Buscador Simplificado -->
                        <div class="search-prog-container">
                            <input type="number" id="search-progressive" placeholder="🔍 Prog. (m)" title="Ingresar Progresiva Exacta y dar Enter para fijar">
                        </div>
                    </div>

                    <div style="display:flex; align-items:center; gap:6px;">
                        <button id="btn-prev-profile" class="btn-profile-nav" title="Perfil Anterior">◀</button>
                        <span id="active-profile-title" style="color: var(--accent-color); font-size:12px; font-weight:bold;">[Ninguno]</span>
                        <button id="btn-next-profile" class="btn-profile-nav" title="Perfil Siguiente">▶</button>
                    </div>
                </div>
                
                <div id="zoom-controls-2d">
                    <button class="zoom-btn" id="btn-zoom-in" title="Acercar">+</button>
                    <button class="zoom-btn" id="btn-zoom-out" title="Alejar">-</button>
                    <button class="zoom-btn" id="btn-zoom-reset" title="Restaurar vista original (Ajustar)">⟲</button>
                </div>

                <canvas id="canvas-2d" tabindex="0"></canvas>
                <div id="tooltip-2d"></div>
                <div id="laser-info"></div>
                
                <div id="dpad-container">
                    <div class="dpad-row"><button class="dpad-btn" id="btn-up">▲</button></div>
                    <div class="dpad-row">
                        <button class="dpad-btn" id="btn-left">◀</button>
                        <button class="dpad-btn" id="btn-center" title="Fijar Punto (Enter)">🎯</button>
                        <button class="dpad-btn" id="btn-right">▶</button>
                    </div>
                    <div class="dpad-row"><button class="dpad-btn" id="btn-down">▼</button></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        window.toggleAccordion = function(header) {
            header.classList.toggle('active');
            const content = header.nextElementSibling;
            const chevron = header.querySelector('.chevron');
            if (header.classList.contains('active')) {
                content.style.display = 'block';
                chevron.innerText = '▲';
            } else {
                content.style.display = 'none';
                chevron.innerText = '▼';
            }
        };

        let scene, camera, renderer, controls;
        let terrenoMesh = null;
        let terrenoCrudoData = null; 
        let nombreArchivoTerreno = null; 
        
        const perfilesCargados = {}; 
        const perfilesRawData = {}; 
        
        const progresivasCargadas = {}; 

        let centerOffset = null; 
        let activeProfileName = null; 

        let canvas2D, ctx2D, tooltip2D;
        let dataProyeccion2D = null; 
        let isProcessing2D = false;
        let currentRenderId = 0; 
        let clickedPoint2D = null; 
        let laserMesh = null; 

        let cursorX = -1000, cursorY = -1000;
        let cursorMundoS = 0, cursorMundoZ = 0;
        let isCursorActive = false;
        
        let snapS = null; 

        let zoom2D = 1.0;
        let panX = 0;
        let panY = 0;

        const rawMeshCanvas = document.createElement('canvas');
        const ctxRaw = rawMeshCanvas.getContext('2d', { alpha: true });
        let escalaRaw = 1;
        
        const canvas2DCache = document.createElement('canvas');
        const ctxCache = canvas2DCache.getContext('2d', { alpha: false });
        
        let transX = 0, transY = 0, escalaGlobal = 1, minZ_grid = 0;
        const dpr = Math.min(window.devicePixelRatio || 1, 2); 

        function init() {
            const container = document.getElementById('canvas-3d');
            canvas2D = document.getElementById('canvas-2d');
            ctx2D = canvas2D.getContext('2d', { alpha: false });
            tooltip2D = document.getElementById('tooltip-2d');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            const ch = container.clientHeight || window.innerHeight;
            const cw = container.clientWidth || window.innerWidth / 2;
            camera = new THREE.PerspectiveCamera(45, cw / ch, 1, 100000);
            camera.position.set(500, -800, 500);
            camera.up.set(0, 0, 1); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(cw, ch);
            renderer.setPixelRatio(dpr);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight.position.set(2000, 2000, 10000);
            scene.add(dirLight);

            const gridHelper = new THREE.GridHelper(10000, 100, 0x333333, 0x1a1a1a);
            gridHelper.rotation.x = Math.PI / 2;
            scene.add(gridHelper);

            const sg = new THREE.SphereGeometry(1, 16, 16);
            const sm = new THREE.MeshBasicMaterial({color: 0xff1744, depthTest: false});
            laserMesh = new THREE.Mesh(sg, sm);
            laserMesh.renderOrder = 999;
            laserMesh.visible = false;
            scene.add(laserMesh);

            vincularEventosUI();
            animate();
            setTimeout(onWindowResize, 100);

            cargarDatosPreestablecidos();
        }

        async function cargarDatosPreestablecidos() {
            try {
                const resTerreno = await fetch('terreno_web.json');
                if (resTerreno.ok) {
                    const dataTerreno = await resTerreno.json();
                    terrenoCrudoData = dataTerreno;
                    nombreArchivoTerreno = "terreno_web.json";
                    construirTerreno(dataTerreno, "terreno_web.json");
                }
            } catch (e) {
                console.warn("Autocarga de terreno omitida:", e);
            }

            const nombresPerfiles = ['Perfil1.json', 'Perfil2.json', 'Perfil3.json', 'Perfil4.json'];
            let primerPerfilCargado = null;
            let nombrePrimerPerfil = "";

            for (const nombre of nombresPerfiles) {
                try {
                    const resPerfil = await fetch(nombre);
                    if (resPerfil.ok) {
                        const dataPerfil = await resPerfil.json();
                        construirPerfil(dataPerfil, nombre);
                        
                        if (!primerPerfilCargado) {
                            primerPerfilCargado = dataPerfil;
                            nombrePrimerPerfil = nombre;
                        }

                        const nombreTXT = nombre.replace('Perfil', 'PL').replace('.json', '.txt');
                        const resTXT = await fetch(nombreTXT);
                        if (resTXT.ok) {
                            const txtData = await resTXT.text();
                            procesarProgresivasTXT(txtData, nombreTXT);
                        }
                        
                        await new Promise(r => setTimeout(r, 10));
                    }
                } catch (e) {
                    console.warn(`Error al cargar ${nombre}:`, e);
                }
            }

            if (primerPerfilCargado) {
                activarPerfil2D(nombrePrimerPerfil, primerPerfilCargado);
            }
        }

        function procesarProgresivasTXT(text, filename) {
            const lines = text.trim().split('\n');
            const data = [];
            for(let line of lines) {
                const parts = line.trim().split(/\s+/);
                if(parts.length >= 5) {
                    const id = parseInt(parts[0]);
                    const x = parseFloat(parts[1]);
                    const y = parseFloat(parts[2]);
                    const z = parseFloat(parts[3]);
                    const s = parseFloat(parts[4]);
                    
                    if (!isNaN(x) && !isNaN(y) && !isNaN(z) && !isNaN(s)) {
                        data.push({ id, x, y, z, s });
                    }
                }
            }
            if(data.length > 0) {
                data.sort((a,b) => a.s - b.s); 
                progresivasCargadas[filename] = data;
                actualizarUILista(filename, 'progresiva');
                actualizarEstadoVinculoTXT(); 
            } else {
                console.warn("No se encontraron datos válidos en el archivo TXT: " + filename);
            }
        }

        function actualizarEstadoVinculoTXT() {
            for (const perfilName in perfilesRawData) {
                const safeId = perfilName.replace(/[^a-zA-Z0-9]/g, '_');
                const statusEl = document.getElementById(`status-txt-${safeId}`);
                if (!statusEl) continue;

                const txtName = perfilName.replace('Perfil', 'PL').replace('.json', '.txt');
                const altName = perfilName.replace('.json', '.txt');
                
                if (progresivasCargadas[txtName]) {
                    statusEl.innerHTML = `✅ Perfil desenrollado según: <span style="color:#fff; font-weight:bold;">${txtName}</span>`;
                    statusEl.style.color = "#81c784";
                } else if (progresivasCargadas[altName]) {
                    statusEl.innerHTML = `✅ Perfil desenrollado según: <span style="color:#fff; font-weight:bold;">${altName}</span>`;
                    statusEl.style.color = "#81c784";
                } else {
                    statusEl.innerHTML = `⚠️ Sin TXT. Modo Respaldo: Curva Aproximada.`;
                    statusEl.style.color = "#ffb74d";
                }
            }
        }

        function proyectarXYEnSegmentosPrecalculados(x, y, segmentos) {
            if (!segmentos || segmentos.length === 0) return 0;
            let minDistSq = Infinity;
            let bestS = 0;

            for (let i = 0; i < segmentos.length; i++) {
                let seg = segmentos[i];
                let t = 0;
                if (seg.l2 > 0) t = ((x - seg.p1.x) * seg.dx + (y - seg.p1.y) * seg.dy) / seg.l2;
                
                let tc = t < 0 ? 0 : (t > 1 ? 1 : t);
                
                let px = seg.p1.x + tc * seg.dx;
                let py = seg.p1.y + tc * seg.dy;
                let distSq = (x - px)*(x - px) + (y - py)*(y - py);
                
                if (distSq < minDistSq) {
                    minDistSq = distSq;
                    let trueT = tc;
                    if (i === 0 && t < 0) trueT = t;
                    if (i === segmentos.length - 1 && t > 1) trueT = t;
                    bestS = seg.p1.s + trueT * (seg.p2.s - seg.p1.s);
                }
            }
            return bestS;
        }

        function obtenerCoordenadasDesdeS(S, poliLinea) {
            if (!poliLinea || poliLinea.length === 0) return null;
            if (poliLinea.length === 1) return { x: poliLinea[0].x, y: poliLinea[0].y, z: poliLinea[0].z, s: S };

            let p1 = poliLinea[0];
            let p2 = poliLinea[poliLinea.length - 1];

            if (S <= p1.s) { 
                p2 = poliLinea[1]; 
            } else if (S >= p2.s) { 
                p1 = poliLinea[poliLinea.length - 2]; 
            } else {
                for(let i = 0; i < poliLinea.length - 1; i++) {
                    if (S >= poliLinea[i].s && S <= poliLinea[i+1].s) {
                        p1 = poliLinea[i];
                        p2 = poliLinea[i+1];
                        break;
                    }
                }
            }

            let range = p2.s - p1.s;
            let t = (range === 0) ? 0 : (S - p1.s) / range;
            
            return {
                x: p1.x + t * (p2.x - p1.x),
                y: p1.y + t * (p2.y - p1.y),
                z: (p1.z !== undefined && p2.z !== undefined) ? p1.z + t * (p2.z - p1.z) : undefined,
                s: S
            };
        }

        function obtenerCoordenadasReales(S) {
            if (!activeProfileName) return null;
            let txtName = activeProfileName.replace('Perfil', 'PL').replace('.json', '.txt');
            let altName = activeProfileName.replace('.json', '.txt');
            let txtData = progresivasCargadas[txtName] || progresivasCargadas[altName];
            
            if (txtData) {
                return obtenerCoordenadasDesdeS(S, txtData); 
            } else if (dataProyeccion2D && dataProyeccion2D.spineFallback) {
                return obtenerCoordenadasDesdeS(S, dataProyeccion2D.spineFallback);
            }
            return null;
        }

        function crearSpineFallback(data) {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            let pMinX = null, pMaxX = null, pMinY = null, pMaxY = null;
            
            data.forEach(capa => {
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    let vx = capa.vertices[i], vy = capa.vertices[i+1];
                    if (Number.isFinite(vx) && Number.isFinite(vy)) {
                        if (vx < minX) { minX = vx; pMinX = {x:vx, y:vy}; }
                        if (vx > maxX) { maxX = vx; pMaxX = {x:vx, y:vy}; }
                        if (vy < minY) { minY = vy; pMinY = {x:vx, y:vy}; }
                        if (vy > maxY) { maxY = vy; pMaxY = {x:vx, y:vy}; }
                    }
                }
            });
            
            let pStart, pEnd;
            if ((maxX - minX) >= (maxY - minY)) { pStart = pMinX; pEnd = pMaxX; } 
            else { pStart = pMinY; pEnd = pMaxY; }
            
            let dirX = pEnd.x - pStart.x, dirY = pEnd.y - pStart.y;
            let length = Math.hypot(dirX, dirY);
            if (length === 0) return [];
            
            let uX = dirX / length, uY = dirY / length;
            
            let numBins = 100; 
            let bins = Array.from({length: numBins}, () => ({ sumX: 0, sumY: 0, count: 0 }));
            let minProj = Infinity, maxProj = -Infinity;
            
            data.forEach(capa => {
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    let vx = capa.vertices[i], vy = capa.vertices[i+1];
                    if (Number.isFinite(vx)) {
                        let proj = (vx - pStart.x) * uX + (vy - pStart.y) * uY;
                        if (proj < minProj) minProj = proj;
                        if (proj > maxProj) maxProj = proj;
                    }
                }
            });
            
            let projRange = maxProj - minProj;
            if (projRange === 0) return [];

            data.forEach(capa => {
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    let vx = capa.vertices[i], vy = capa.vertices[i+1];
                    if (Number.isFinite(vx)) {
                        let proj = (vx - pStart.x) * uX + (vy - pStart.y) * uY;
                        let t = (proj - minProj) / projRange;
                        let binIdx = Math.max(0, Math.min(numBins - 1, Math.floor(t * numBins)));
                        bins[binIdx].sumX += vx;
                        bins[binIdx].sumY += vy;
                        bins[binIdx].count++;
                    }
                }
            });
            
            let spine = [];
            let currentS = 0;
            let lastPt = null;
            
            for (let i = 0; i < numBins; i++) {
                if (bins[i].count > 0) {
                    let pt = { x: bins[i].sumX / bins[i].count, y: bins[i].sumY / bins[i].count };
                    if (lastPt) {
                        currentS += Math.hypot(pt.x - lastPt.x, pt.y - lastPt.y);
                    }
                    spine.push({ x: pt.x, y: pt.y, s: currentS });
                    lastPt = pt;
                }
            }
            return spine;
        }

        // FASE 2: Centrado y Alineación Vertical Inteligente al cambiar a progresiva fija
        function centrarVistaEnProgresiva(S) {
            if (!dataProyeccion2D) return;
            const logicalW = canvas2D.width / dpr;
            const logicalH = canvas2D.height / dpr;
            const paddingLeft = 60;
            const paddingRight = 60;
            const paddingTop = 40;
            const paddingBottom = 60;
            const w_canvas = logicalW - (paddingLeft + paddingRight);
            const h_canvas = logicalH - (paddingTop + paddingBottom);

            const rngS = Math.max(dataProyeccion2D.maxS - dataProyeccion2D.minS, 1);
            const rngZ = Math.max(dataProyeccion2D.maxZ_grid - dataProyeccion2D.minZ_grid, 1);
            
            // Re-calculo de escala global momentánea
            escalaGlobal = Math.min(w_canvas / rngS, h_canvas / rngZ) * zoom2D;

            // Alineación Horizontal (X): Fijar progresiva al centro de la mira
            panX = (logicalW / 2) - paddingLeft - (w_canvas - rngS * escalaGlobal) / 2 - (S - dataProyeccion2D.minS) * escalaGlobal;

            // Alineación Vertical (Y): Al último punto seleccionado si existe, sino al centro
            if (clickedPoint2D) {
                const targetY = logicalH / 2;
                const baseTransY = paddingTop + (h_canvas + rngZ * escalaGlobal) / 2;
                const zOffset = (clickedPoint2D.z - dataProyeccion2D.minZ_grid) * escalaGlobal;
                panY = targetY + zOffset - baseTransY;
            } else {
                panY = 0; // Centrado por defecto en altura media
            }

            reconstruirCacheScreen();
            
            // Mira Central Fija se activa
            cursorX = logicalW / 2;
            cursorY = logicalH / 2;
            isCursorActive = true;
            updateCursor2D();
            triggerCursorClick();
        }

        function vincularEventosUI() {
            const bindEvent = (id, event, callback) => {

            bindEvent('toggle-sidebar', 'click', () => {

                setTimeout(onWindowResize, 310);
            });

            bindEvent('btn-toggle-2d', 'click', toggle2DPanel);
            bindEvent('toggle-2d-sidebar', 'click', toggle2DPanel);
            bindEvent('btn-prev-profile', 'click', () => cambiarPerfilSiguiente(-1));
            bindEvent('btn-next-profile', 'click', () => cambiarPerfilSiguiente(1));

            // FASE 2: Buscador Simplificado de Progresivas
            const searchInput = document.getElementById('search-progressive');

                if (!dataProyeccion2D) return;
                const val = parseFloat(e.target.value);
                if (!isNaN(val) && val >= dataProyeccion2D.minS && val <= dataProyeccion2D.maxS) {

                    isCursorActive = true;
                    searchInput.style.color = "var(--accent-color)";
                    updateCursor2D();
                } else {
                    snapS = null;
                    searchInput.style.color = "var(--danger-color)";
                    if (e.target.value === '') searchInput.style.color = "var(--accent-color)";
                    dibu2D();
                }
            });

            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    snapS = null;
                    searchInput.blur();
                    searchInput.style.color = "var(--accent-color)";
                    dibu2D();
                } else if (e.key === 'Enter' && snapS !== null) {
                    centrarVistaEnProgresiva(snapS);
                }
            });

            bindEvent('chk-terreno', 'change', (e) => { if (terrenoMesh) terrenoMesh.visible = e.target.checked; });
            
            bindEvent('color-terreno', 'input', (e) => { 
                document.getElementById('hex-terreno').innerText = e.target.value.toUpperCase();
                if (terrenoMesh) { 
                    if (Array.isArray(terrenoMesh.material)) {
                        terrenoMesh.material[0].color.set(e.target.value);
                        terrenoMesh.material[1].color.set(e.target.value);
                    } else {
                        terrenoMesh.material.color.set(e.target.value); 
                    }
                } 
            });

            bindEvent('opacity-terreno', 'input', (e) => { 
                if (terrenoMesh) { 
                    const val = parseFloat(e.target.value);
                    if (Array.isArray(terrenoMesh.material)) {
                        terrenoMesh.material[0].opacity = val;
                        if (!document.getElementById('chk-cortinas').checked) {
                            terrenoMesh.material[1].opacity = val;
                        }
                    } else {
                        terrenoMesh.material.opacity = val; 
                    }
                } 
            });
            
            bindEvent('chk-cortinas', 'change', (e) => { 
                if (terrenoMesh && Array.isArray(terrenoMesh.material)) {
                    const cortinasTransparentes = e.target.checked;
                    terrenoMesh.material[1].opacity = cortinasTransparentes ? 0.05 : parseFloat(document.getElementById('opacity-terreno').value);
                    terrenoMesh.material[1].depthWrite = !cortinasTransparentes;
                }
            });

            bindEvent('z-limit-input', 'change', () => { 
                if (terrenoCrudoData) construirTerreno(terrenoCrudoData, nombreArchivoTerreno || "Terreno"); 
            });

            bindEvent('file-loader', 'change', (e) => {
                const files = e.target.files;
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        if (file.name.toLowerCase().endsWith('.txt')) {
                            procesarProgresivasTXT(event.target.result, file.name);
                        } else {
                            try {
                                const data = JSON.parse(event.target.result);
                                if (data.tipo === "terreno") {
                                    terrenoCrudoData = data; nombreArchivoTerreno = file.name;
                                    construirTerreno(data, file.name);
                                } else if (Array.isArray(data)) {
                                    construirPerfil(data, file.name);
                                }
                            } catch (err) { alert("Error al procesar el archivo JSON: " + err.message); }
                        }
                    };
                    reader.readAsText(file);
                }
                e.target.value = '';
            });

            window.addEventListener('resize', onWindowResize);
            
            const factorBoton = window.innerWidth <= 768 ? 1.2 : 1.3;

            bindEvent('btn-zoom-in', 'click', () => {
                zoom2D = Math.min(30, zoom2D * factorBoton);
                reconstruirCacheScreen();
                if (isCursorActive) updateCursor2D();
            });
            bindEvent('btn-zoom-out', 'click', () => {
                zoom2D = Math.max(0.5, zoom2D / factorBoton);
                reconstruirCacheScreen();
                if (isCursorActive) updateCursor2D();
            });
            
            // FASE 2: Botón Ajustar/Restaurar Vista Original
            bindEvent('btn-zoom-reset', 'click', () => {
                zoom2D = 1.0;
                panX = 0;
                panY = 0;
                snapS = null;
                clickedPoint2D = null;
                document.getElementById('search-progressive').value = '';
                reconstruirCacheScreen();
                
                const logicalW = canvas2D.width / dpr;
                const logicalH = canvas2D.height / dpr;
                cursorX = logicalW / 2;
                cursorY = logicalH / 2;
                isCursorActive = true;
                updateCursor2D();
                triggerCursorClick();
            });
            
            if (canvas2D) {
                let isDragging2D = false;
                let startDragX = 0, startDragY = 0;
                let originalPanX = 0, originalPanY = 0;
                let dragMoved = false;
                let touchStartDist = 0;
                let isPinchZooming = false;

                canvas2D.addEventListener('wheel', (e) => {
                    if (!dataProyeccion2D) return;
                    e.preventDefault();
                    const zoomFactor = e.deltaY < 0 ? 1.15 : 0.85;
                    zoom2D = Math.max(0.5, Math.min(30, zoom2D * zoomFactor));
                    reconstruirCacheScreen();
                    if (isCursorActive) updateCursor2D();
                }, { passive: false });

                canvas2D.addEventListener('mousedown', (e) => {
                    if (!dataProyeccion2D) return;
                    isDragging2D = true;
                    const rect = canvas2D.getBoundingClientRect();
                    startDragX = e.clientX - rect.left;
                    startDragY = e.clientY - rect.top;
                    originalPanX = panX;
                    originalPanY = panY;
                    dragMoved = false;
                });

                canvas2D.addEventListener('mousemove', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();
                    const curX = e.clientX - rect.left;
                    const curY = e.clientY - rect.top;

                    // FASE 2: El paneo desplaza la imagen bajo la mira central fija
                    if (isDragging2D) {
                        const dx = curX - startDragX;
                        const dy = curY - startDragY;
                        if (Math.hypot(dx, dy) > 4) {
                            dragMoved = true;
                            if (snapS !== null) {
                                panY = originalPanY + dy; // Bloquear X en modo snap
                            } else {
                                panX = originalPanX + dx;
                                panY = originalPanY + dy;
                            }
                            reconstruirCacheScreen();
                            
                            // Forzar mira al centro del canvas lógico
                            const logicalW = canvas2D.width / dpr;
                            const logicalH = canvas2D.height / dpr;
                            cursorX = logicalW / 2;
                            cursorY = logicalH / 2;
                            isCursorActive = true;
                            updateCursor2D();
                            triggerCursorClick(); // Actualizar 3D en tiempo real
                        }
                    }
                });

                canvas2D.addEventListener('mouseup', (e) => {
                    if (isDragging2D) isDragging2D = false;
                });

                canvas2D.addEventListener('mouseleave', () => { 
                    isDragging2D = false;
                });

                canvas2D.addEventListener('touchstart', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();
                    isDragging2D = true;
                    dragMoved = false;

                    if (e.touches.length === 1) {
                        isPinchZooming = false;
                        startDragX = e.touches[0].clientX - rect.left;
                        startDragY = e.touches[0].clientY - rect.top;
                        originalPanX = panX;
                        originalPanY = panY;
                        
                        // Forzar mira al centro lógicos
                        const logicalW = canvas2D.width / dpr;
                        const logicalH = canvas2D.height / dpr;
                        cursorX = logicalW / 2; cursorY = logicalH / 2;
                        isCursorActive = true; updateCursor2D();
                    } else if (e.touches.length === 2) {
                        isPinchZooming = true;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        touchStartDist = Math.hypot(dx, dy);
                    }
                }, { passive: true });

                canvas2D.addEventListener('touchmove', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();

                    if (isPinchZooming && e.touches.length === 2) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const currentDist = Math.hypot(dx, dy);
                        if (touchStartDist > 0) {
                            const factor = currentDist / touchStartDist;
                            const dampFactor = 1 + (factor - 1) * 0.65; 
                            zoom2D = Math.max(0.5, Math.min(30, zoom2D * dampFactor));
                            touchStartDist = currentDist;
                            reconstruirCacheScreen();
                            
                            const logicalW = canvas2D.width / dpr;
                            const logicalH = canvas2D.height / dpr;
                            cursorX = logicalW / 2; cursorY = logicalH / 2;
                            isCursorActive = true; updateCursor2D();
                            triggerCursorClick();
                        }
                    } else if (isDragging2D && e.touches.length === 1) {
                        e.preventDefault();
                        const curX = e.touches[0].clientX - rect.left;
                        const curY = e.touches[0].clientY - rect.top;
                        const dx = curX - startDragX;
                        const dy = curY - startDragY;

                        if (Math.hypot(dx, dy) > 5) {
                            dragMoved = true;
                            if (snapS !== null) {
                                panY = originalPanY + dy;
                            } else {
                                panX = originalPanX + dx;
                                panY = originalPanY + dy;
                            }
                            reconstruirCacheScreen();
                            
                            const logicalW = canvas2D.width / dpr;
                            const logicalH = canvas2D.height / dpr;
                            cursorX = logicalW / 2; cursorY = logicalH / 2;
                            isCursorActive = true; updateCursor2D();
                            triggerCursorClick();
                        }
                    }
                }, { passive: false });

                canvas2D.addEventListener('touchend', (e) => {
                    if (isDragging2D) {
                        isDragging2D = false;
                        isPinchZooming = false;
                    }
                });

                window.addEventListener('keydown', (e) => {
                    if (!dataProyeccion2D || isProcessing2D || !isCursorActive) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;

                    let step = e.shiftKey ? 10 : 2;
                    let moved = false;
                    
                    // Flechas ahora mueven el perfil geofísico por debajo de la mira fija
                    switch (e.key) {
                        case 'ArrowLeft': if (snapS === null) { panX += step; moved = true; } break;
                        case 'ArrowRight': if (snapS === null) { panX -= step; moved = true; } break;
                        case 'ArrowUp': panY += step; moved = true; break;
                        case 'ArrowDown': panY -= step; moved = true; break;
                    }
                    if (moved) {
                        reconstruirCacheScreen();
                        const logicalW = canvas2D.width / dpr;
                        const logicalH = canvas2D.height / dpr;
                        cursorX = logicalW / 2;
                        cursorY = logicalH / 2;
                        isCursorActive = true;
                        updateCursor2D(); e.preventDefault();
                        triggerCursorClick();
                    }
                });
            }

            let dpadInterval;
            const startMove = (dx, dy) => {
                const move = () => { 
                    if (snapS !== null && dx !== 0) return; // Bloquear X en snap
                    panX += dx; 
                    panY += dy; 
                    reconstruirCacheScreen();
                    
                    const logicalW = canvas2D.width / dpr;
                    const logicalH = canvas2D.height / dpr;
                    cursorX = logicalW / 2; cursorY = logicalH / 2;
                    isCursorActive = true; updateCursor2D();
                    triggerCursorClick();
                };
                move();
                dpadInterval = setInterval(move, 50);
            };
            const stopMove = () => clearInterval(dpadInterval);
            const bindDpad = (id, dx, dy) => {
                const el = document.getElementById(id);
                el.addEventListener('mousedown', () => startMove(dx, dy));
                el.addEventListener('mouseup', stopMove);
                el.addEventListener('mouseleave', stopMove);
                
                el.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(dx, dy); }, {passive: false});
                el.addEventListener('touchend', stopMove);
            };
            bindDpad('btn-up', 0, 3); bindDpad('btn-down', 0, -3);
            bindDpad('btn-left', 3, 0); bindDpad('btn-right', -3, 0);
            
            const btnCenter = document.getElementById('btn-center');
            btnCenter.addEventListener('mousedown', triggerCursorClick);
            btnCenter.addEventListener('touchstart', (e) => { e.preventDefault(); triggerCursorClick(); }, {passive: false});
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        function onWindowResize() {
            const container = document.getElementById('canvas-3d');
            if (!container || container.clientWidth === 0 || container.clientHeight === 0) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            resize2DCanvas();
        }

        function resize2DCanvas() {
            if (!canvas2D) return;
            const rect = canvas2D.parentElement.getBoundingClientRect();
            const headerH = document.getElementById('view-2d-header').offsetHeight;
            
            const logicalW = rect.width;
            let logicalH = rect.height - headerH;
            if (logicalH < 0) logicalH = 0;
            
            canvas2D.width = logicalW * dpr;
            canvas2D.height = logicalH * dpr;
            canvas2D.style.width = `${logicalW}px`;
            canvas2D.style.height = `${logicalH}px`;
            
            if (logicalH > 0) {
                if (!isProcessing2D && dataProyeccion2D) {
                    reconstruirCacheScreen(); 
                } else if (!dataProyeccion2D) {
                    ctx2D.fillStyle = '#0a0a0a';
                    ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);
                }
            }
        }

        function obtenerOffset(vertices) {
            if (centerOffset === null && vertices && vertices.length >= 3) {
                let sumX = 0, sumY = 0, sumZ = 0, count = 0;
                for (let i = 0; i < vertices.length; i += 3) { 
                    if (Number.isFinite(vertices[i]) && Number.isFinite(vertices[i+1]) && Number.isFinite(vertices[i+2])) {
                        sumX += vertices[i]; sumY += vertices[i+1]; sumZ += vertices[i+2]; count++;
                    }
                }
                if (count > 0) {
                    centerOffset = new THREE.Vector3(sumX / count, sumY / count, sumZ / count);
                } else {
                    centerOffset = new THREE.Vector3(0, 0, 0);
                }
            }
        }

        function liberarMemoriaMesh(mesh) {
            if (!mesh) return;
            if (mesh.geometry) mesh.geometry.dispose();
            if (mesh.material) {
                if (Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose());
                else mesh.material.dispose();
            }
        }

        function construirTerreno(data, nombreArchivo) {
            const inputVal = parseFloat(document.getElementById('z-limit-input').value);
            const zLimite = isNaN(inputVal) ? -999999 : inputVal;

            const carasSuperficie = [];
            const carasCortina = [];
            const numVertices = data.vertices.length / 3;

            for (let i = 0; i < data.caras.length; i += 3) {
                let idx1 = data.caras[i];
                let idx2 = data.caras[i+1];
                let idx3 = data.caras[i+2];

                if (idx1 >= numVertices || idx2 >= numVertices || idx3 >= numVertices) continue;

                let x1 = data.vertices[idx1 * 3],     y1 = data.vertices[idx1 * 3 + 1], z1 = data.vertices[idx1 * 3 + 2];
                let x2 = data.vertices[idx2 * 3],     y2 = data.vertices[idx2 * 3 + 1], z2 = data.vertices[idx2 * 3 + 2];
                let x3 = data.vertices[idx3 * 3],     y3 = data.vertices[idx3 * 3 + 1], z3 = data.vertices[idx3 * 3 + 2];
                
                if (Number.isFinite(z1) && Number.isFinite(z2) && Number.isFinite(z3)) {
                    if (z1 >= zLimite && z2 >= zLimite && z3 >= zLimite) {
                        let esParedVertical = false;
                        
                        let ux = x2 - x1, uy = y2 - y1, uz = z2 - z1;
                        let vx = x3 - x1, vy = y3 - y1, vz = z3 - z1;
                        
                        let nx = (uy * vz) - (uz * vy);
                        let ny = (uz * vx) - (ux * vz);
                        let nz = (ux * vy) - (uy * vx);
                        
                        let length = Math.sqrt(nx*nx + ny*ny + nz*nz);
                        if (length > 0) {
                            let normalizedNz = Math.abs(nz / length);
                            if (normalizedNz < 0.15) { 
                                esParedVertical = true;
                            }
                        }

                        if (esParedVertical) {
                            carasCortina.push(idx1, idx2, idx3);
                        } else {
                            carasSuperficie.push(idx1, idx2, idx3);
                        }
                    }
                }
            }

            if (carasSuperficie.length + carasCortina.length === 0) {
                alert("El límite Z es demasiado alto. Ajusta los parámetros para poder ver el terreno.");
                return;
            }

            let isFirstLoad = (terrenoMesh === null);

            if (terrenoMesh) { 
                scene.remove(terrenoMesh); 
                liberarMemoriaMesh(terrenoMesh); 
            }

            obtenerOffset(data.vertices);
            
            const indexMap = new Map();
            const verticesEmpaquetados = [];
            const carasSupEmpaquetadas = [];
            const carasCortEmpaquetadas = [];
            let indexCounter = 0;

            const procesarCara = (oldIdx, arrayDestino) => {
                if (!indexMap.has(oldIdx)) {
                    indexMap.set(oldIdx, indexCounter);
                    verticesEmpaquetados.push(
                        data.vertices[oldIdx * 3] - centerOffset.x,
                        data.vertices[oldIdx * 3 + 1] - centerOffset.y,
                        data.vertices[oldIdx * 3 + 2] - centerOffset.z
                    );
                    indexCounter++;
                }
                arrayDestino.push(indexMap.get(oldIdx));
            };

            for (let i = 0; i < carasSuperficie.length; i++) procesarCara(carasSuperficie[i], carasSupEmpaquetadas);
            for (let i = 0; i < carasCortina.length; i++) procesarCara(carasCortina[i], carasCortEmpaquetadas);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verticesEmpaquetados), 3));
            
            const allIndices = new Uint32Array(carasSupEmpaquetadas.length + carasCortEmpaquetadas.length);
            allIndices.set(carasSupEmpaquetadas, 0);
            allIndices.set(carasCortEmpaquetadas, carasSupEmpaquetadas.length);
            
            geometry.setIndex(new THREE.BufferAttribute(allIndices, 1));
            
            geometry.addGroup(0, carasSupEmpaquetadas.length, 0);
            geometry.addGroup(carasSupEmpaquetadas.length, carasCortEmpaquetadas.length, 1);
            
            geometry.computeVertexNormals();
            geometry.computeBoundingSphere(); 

            const baseColor = document.getElementById('color-terreno').value;
            const baseOpacity = parseFloat(document.getElementById('opacity-terreno').value);
            const cortinasTrans = document.getElementById('chk-cortinas').checked;

            const matNormal = new THREE.MeshLambertMaterial({ 
                color: baseColor, transparent: true, opacity: baseOpacity, side: THREE.DoubleSide 
            });
            
            const matCortina = new THREE.MeshLambertMaterial({ 
                color: baseColor, transparent: true, 
                opacity: cortinasTrans ? 0.05 : baseOpacity, 
                depthWrite: !cortinasTrans,
                side: THREE.DoubleSide 
            });

            terrenoMesh = new THREE.Mesh(geometry, [matNormal, matCortina]);
            scene.add(terrenoMesh);
            
            if (isFirstLoad && geometry.boundingSphere && !isNaN(geometry.boundingSphere.center.x)) {
                controls.target.copy(geometry.boundingSphere.center);
                camera.position.set(
                    geometry.boundingSphere.center.x + 300, 
                    geometry.boundingSphere.center.y - 400, 
                    geometry.boundingSphere.center.z + 300
                );
            }
            
            actualizarUILista(nombreArchivo, 'terreno');
        }

        function construirPerfil(data, nombreArchivo) {
            if (perfilesCargados[nombreArchivo]) { perfilesCargados[nombreArchivo].forEach(m => { scene.remove(m); liberarMemoriaMesh(m); }); }
            if (data.length > 0 && data[0].vertices && data[0].vertices.length > 0) obtenerOffset(data[0].vertices);

            perfilesRawData[nombreArchivo] = data; 

            const meshes = [];
            const bboxGlobal = new THREE.Box3();

            data.forEach(capa => {
                const geometry = new THREE.BufferGeometry();
                const verticesModificados = new Float32Array(capa.vertices.length);
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    verticesModificados[i]   = Number.isFinite(capa.vertices[i]) ? (capa.vertices[i] - centerOffset.x) : 0;
                    verticesModificados[i+1] = Number.isFinite(capa.vertices[i+1]) ? (capa.vertices[i+1] - centerOffset.y) : 0;
                    verticesModificados[i+2] = Number.isFinite(capa.vertices[i+2]) ? (capa.vertices[i+2] - centerOffset.z) : 0;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(verticesModificados, 3));
                geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(capa.caras), 1)); 
                geometry.computeVertexNormals(); 
                geometry.computeBoundingBox();
                
                if (geometry.boundingBox && !isNaN(geometry.boundingBox.min.x)) {
                    bboxGlobal.union(geometry.boundingBox);
                }

                const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: capa.color, side: THREE.DoubleSide }));
                scene.add(mesh); meshes.push(mesh);
            });

            perfilesCargados[nombreArchivo] = meshes;
            actualizarUILista(nombreArchivo, 'perfil', data);
            
            if (!terrenoMesh && Object.keys(perfilesCargados).length === 1 && !bboxGlobal.isEmpty()) {
                const center = bboxGlobal.getCenter(new THREE.Vector3());
                if (!isNaN(center.x)) {
                    controls.target.copy(center);
                    camera.position.set(center.x + 150, center.y - 200, center.z + 150);
                }
            }
            
            actualizarEstadoVinculoTXT(); 
        }

        function reconstruirCacheScreen() {
            if (!dataProyeccion2D || !canvas2D) return;
            
            canvas2DCache.width = canvas2D.width;
            canvas2DCache.height = canvas2D.height;
            
            ctxCache.fillStyle = "#0a0a0a";
            ctxCache.fillRect(0, 0, canvas2DCache.width, canvas2DCache.height);
            
            ctxCache.save();
            ctxCache.scale(dpr, dpr); 

            const logicalW = canvas2D.width / dpr;
            const logicalH = canvas2D.height / dpr;
            
            const isMobile = window.innerWidth <= 768;
            const paddingLeft = 60;
            const paddingRight = 60;
            const paddingTop = 40;
            const paddingBottom = 60;

            const w_canvas = logicalW - (paddingLeft + paddingRight);
            const h_canvas = logicalH - (paddingTop + paddingBottom);

            if (w_canvas <= 0 || h_canvas <= 0) { ctxCache.restore(); return; }

            const rngS = Math.max(dataProyeccion2D.maxS - dataProyeccion2D.minS, 1);
            const rngZ = Math.max(dataProyeccion2D.maxZ_grid - dataProyeccion2D.minZ_grid, 1);

            const baseEscala = Math.min(w_canvas / rngS, h_canvas / rngZ);
            escalaGlobal = baseEscala * zoom2D;
            
            transX = paddingLeft + (w_canvas - rngS * escalaGlobal) / 2 + panX;
            transY = paddingTop + (h_canvas + rngZ * escalaGlobal) / 2 + panY; 

            // FASE 2: CÁLCULO DE PASOS Y MARCADORES DINÁMICOS
            const spanS = w_canvas / escalaGlobal;
            const spanZ = h_canvas / escalaGlobal;

            // Buscamos tener aproximadamente entre 6 y 10 líneas en pantalla
            const targetStepS = spanS / 8;
            const targetStepZ = spanZ / 6;

            const niceStepsS = [10000, 5000, 2000, 1000, 500, 200, 100, 50, 20, 10];
            let pasoS = 10;
            for (let step of niceStepsS) {
                if (targetStepS >= step) { pasoS = step; break; }
            }
            pasoS = Math.max(10, pasoS); // Límite mínimo de 10m en progresiva

            const niceStepsZ = [10000, 5000, 2000, 1000, 500, 200, 100, 50, 20, 10, 5];
            let pasoZ = 5;
            for (let step of niceStepsZ) {
                if (targetStepZ >= step) { pasoZ = step; break; }
            }
            pasoZ = Math.max(5, pasoZ); // Límite mínimo de 5m en elevación

            // Definimos el Viewport de visualización
            const vpLeft = paddingLeft;
            const vpRight = logicalW - paddingRight;
            const vpTop = paddingTop;
            const vpBottom = logicalH - paddingBottom;

            // Dibujar grilla de fondo (sólo líneas)
            ctxCache.strokeStyle = "rgba(255, 255, 255, 0.08)";
            ctxCache.lineWidth = 1;

            // 1. Grilla Horizontal (Elevación Z) y Etiquetas Estáticas en el Margen Izquierdo (Sticky)
            ctxCache.fillStyle = "#888888"; 
            ctxCache.font = "11px 'Segoe UI', Tahoma, sans-serif";
            ctxCache.textAlign = "right";
            ctxCache.textBaseline = "middle";

            let startZ = Math.floor(dataProyeccion2D.minZ_grid / pasoZ) * pasoZ;
            for (let z = startZ; z <= dataProyeccion2D.maxZ_grid; z += pasoZ) {
                let y = transY - (z - dataProyeccion2D.minZ_grid) * escalaGlobal;
                if (y >= vpTop && y <= vpBottom) {
                    ctxCache.beginPath(); ctxCache.moveTo(vpLeft, y); ctxCache.lineTo(vpRight, y); ctxCache.stroke();
                    ctxCache.fillText(`${z}m`, vpLeft - 8, y + 1); // Pegado fijamente al margen
                }
            }

            // 2. Grilla Vertical (Progresiva S) y Etiquetas Estáticas en el Margen Inferior (Sticky)
            let startS = Math.floor(dataProyeccion2D.minS / pasoS) * pasoS;
            for (let s = startS; s <= dataProyeccion2D.maxS; s += pasoS) {
                let x = transX + (s - dataProyeccion2D.minS) * escalaGlobal;
                if (x >= vpLeft && x <= vpRight) {
                    ctxCache.beginPath(); ctxCache.moveTo(x, vpTop); ctxCache.lineTo(x, vpBottom); ctxCache.stroke();
                    
                    ctxCache.save();
                    ctxCache.translate(x, vpBottom + 12);
                    ctxCache.rotate(-Math.PI / 4); 
                    ctxCache.fillText(`S:${Math.round(s)}m`, 0, 0);
                    ctxCache.restore();
                }
            }

            // Marco del Viewport principal
            ctxCache.strokeStyle = "rgba(255, 255, 255, 0.2)";
            ctxCache.lineWidth = 1.5;
            ctxCache.strokeRect(vpLeft, vpTop, w_canvas, h_canvas);

            // Dibujar perfil geofísico recortado limpiamente en el Viewport (Clipping)
            ctxCache.save();
            ctxCache.beginPath();
            ctxCache.rect(vpLeft, vpTop, w_canvas, h_canvas);
            ctxCache.clip();

            const screenWidth = rngS * escalaGlobal;
            const screenHeight = rngZ * escalaGlobal;
            ctxCache.drawImage(rawMeshCanvas, transX, transY - screenHeight, screenWidth, screenHeight);
            
            ctxCache.restore();
            ctxCache.restore();
            dibu2D();
        }

        function dibu2D() {
            if (!canvas2D) return;
            ctx2D.fillStyle = '#0a0a0a';
            ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);

            if (dataProyeccion2D) {
                ctx2D.drawImage(canvas2DCache, 0, 0);

                if (clickedPoint2D) {
                    // Solo dibujar el punto si cae dentro del Viewport visible
                    const logicalW = canvas2D.width / dpr;
                    const logicalH = canvas2D.height / dpr;
                    const vpLeft = 60;
                    const vpRight = logicalW - 60;
                    const vpTop = 40;
                    const vpBottom = logicalH - 60;

                    const px = transX + (clickedPoint2D.s - dataProyeccion2D.minS) * escalaGlobal;
                    const py = transY - (clickedPoint2D.z - dataProyeccion2D.minZ_grid) * escalaGlobal;

                    if (px >= vpLeft && px <= vpRight && py >= vpTop && py <= vpBottom) {
                        ctx2D.save();
                        ctx2D.scale(dpr, dpr);
                        ctx2D.strokeStyle = "#ff5252"; ctx2D.lineWidth = 2;
                        ctx2D.beginPath(); ctx2D.arc(px, py, 10, 0, Math.PI*2); ctx2D.stroke();
                        ctx2D.fillStyle = "#ff5252";
                        ctx2D.beginPath(); ctx2D.arc(px, py, 3, 0, Math.PI*2); ctx2D.fill();
                        ctx2D.restore();
                    }
                }
            }
        }

        function updateCursor2D() {
            if (!dataProyeccion2D || isProcessing2D) return;

            // FASE 2: Forzar Mira Central Fija en el centro geométrico del Canvas lógico
            const logicalW = canvas2D.width / dpr;
            const logicalH = canvas2D.height / dpr;
            cursorX = logicalW / 2;
            cursorY = logicalH / 2;
            isCursorActive = true;

            if (snapS !== null) {
                cursorMundoS = snapS;
            } else {
                cursorMundoS = dataProyeccion2D.minS + (cursorX - transX) / escalaGlobal;
            }
            cursorMundoZ = dataProyeccion2D.minZ_grid + (transY - cursorY) / escalaGlobal;

            dibu2D();

            ctx2D.save();
            ctx2D.scale(dpr, dpr);

            // FASE 2: Líneas de Cruz de Alta Visibilidad sobre la mira central fija
            if (snapS !== null) {
                ctx2D.strokeStyle = "#ffeb3b"; // Amarillo Neón de Alta Visibilidad
                ctx2D.lineWidth = 2.5; 
                ctx2D.shadowColor = "rgba(0,0,0,0.8)"; 
                ctx2D.shadowBlur = 4;
                ctx2D.beginPath(); ctx2D.moveTo(cursorX, 0); ctx2D.lineTo(cursorX, logicalH); ctx2D.stroke();
                ctx2D.shadowBlur = 0; 
            } else {
                ctx2D.strokeStyle = "rgba(41, 182, 246, 0.8)"; 
                ctx2D.lineWidth = 1.5; 
                ctx2D.beginPath(); ctx2D.moveTo(cursorX, 0); ctx2D.lineTo(cursorX, logicalH); ctx2D.stroke();
            }

            ctx2D.strokeStyle = "rgba(41, 182, 246, 0.8)"; 
            ctx2D.lineWidth = 1.5;
            ctx2D.beginPath(); ctx2D.moveTo(0, cursorY); ctx2D.lineTo(logicalW, cursorY); ctx2D.stroke();

            // Puntito central de precisión
            ctx2D.fillStyle = "var(--accent-color)";
            ctx2D.beginPath(); ctx2D.arc(cursorX, cursorY, 3, 0, Math.PI*2); ctx2D.fill();

            ctx2D.restore();

            // FASE 2: Ocultar tooltip flotante antiguo y mostrar panel lateral fijo auto-actualizable
            if (tooltip2D) tooltip2D.style.display = 'none';

            if (cursorMundoS < dataProyeccion2D.minS || cursorMundoS > dataProyeccion2D.maxS) {
                document.getElementById('laser-info').style.display = 'none'; return;
            }

            const laserInfo = document.getElementById('laser-info');
            laserInfo.style.display = 'block';

            let profTerreno = "N/A";
            let coords = obtenerCoordenadasReales(cursorMundoS);
            if (coords && terrenoMesh) {
                const xScene = coords.x - centerOffset.x;
                const yScene = coords.y - centerOffset.y;
                const zScene = cursorMundoZ - centerOffset.z;
                const raycaster = new THREE.Raycaster(new THREE.Vector3(xScene, yScene, 999999), new THREE.Vector3(0, 0, -1));
                const intersects = raycaster.intersectObject(terrenoMesh, false);
                if (intersects.length > 0) {
                    const diff = intersects[0].point.z - zScene;
                    profTerreno = diff >= 0 ? diff.toFixed(2) + " m" : "Por encima del terreno";
                } else profTerreno = "Fuera de los límites";
            }

            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                laserInfo.innerHTML = `
                    <div style="color:var(--danger-color); font-weight:bold; font-size:10px; margin-bottom:2px; letter-spacing:0.5px;">🎯 MIRA CENTRAL</div>
                    <div style="font-size:12px; font-weight:bold; line-height:1.2;">Prof. Terreno:<br><span style="color:#81c784; font-size:14px; font-weight:900;">${profTerreno}</span></div>
                    <div style="font-size:9px; color:#aaa; margin-top:3px; border-top:1px solid #333; padding-top:3px;">S: ${cursorMundoS.toFixed(1)} m | Z: ${cursorMundoZ.toFixed(1)} m</div>
                `;
            } else {
                laserInfo.innerHTML = `
                    <div style="color:var(--accent-color); font-weight:bold; margin-bottom:8px; border-bottom:1px solid #444; padding-bottom:5px; font-size:11px;">🎯 MIRA CENTRAL</div>
                    Prof. al Terreno: <span class="val" style="font-size:14px; color:#81c784;">${profTerreno}</span><br>
                    Progresiva S: <span class="val">${cursorMundoS.toFixed(2)} m</span><br>
                    Elevación Z: <span class="val">${cursorMundoZ.toFixed(2)} m</span>
                `;
            }
        }

        function triggerCursorClick() {
            if (!dataProyeccion2D || isProcessing2D) return;
            
            // FASE 2: El láser en 3D sigue a la Mira Fija Central de manera continua
            clickedPoint2D = { s: cursorMundoS, z: cursorMundoZ };

            let coordsReales = obtenerCoordenadasReales(cursorMundoS);
            let xScene = 0, yScene = 0, zScene = 0;

            if (coordsReales) {
                xScene = coordsReales.x - centerOffset.x;
                yScene = coordsReales.y - centerOffset.y;
                zScene = cursorMundoZ - centerOffset.z;
            }

            if (Number.isFinite(xScene) && Number.isFinite(yScene) && Number.isFinite(zScene)) {
                laserMesh.position.set(xScene, yScene, zScene);
                laserMesh.visible = true;
            }
        }

                    </div>`;

                div.querySelector(`#chk-vis-${safeId}`).addEventListener('change', (e) => {
                    if (tipo === 'terreno' && terrenoMesh) { terrenoMesh.visible = e.target.checked; document.getElementById('chk-terreno').checked = e.target.checked; } 
                    else if (tipo === 'perfil' && perfilesCargados[nombre]) { perfilesCargados[nombre].forEach(mesh => mesh.visible = e.target.checked); }
                });

                if (tipo === 'perfil') {
                    div.querySelector('.btn-view-2d').addEventListener('click', () => activarPerfil2D(nombre, rawData));
                }
            }

            div.querySelector('.btn-del').addEventListener('click', () => {
                if (tipo === 'terreno' && terrenoMesh) { 
                    scene.remove(terrenoMesh); liberarMemoriaMesh(terrenoMesh); terrenoMesh = null; terrenoCrudoData = null; nombreArchivoTerreno = null; 
                } else if (tipo === 'perfil' && perfilesCargados[nombre]) {
                    perfilesCargados[nombre].forEach(mesh => { scene.remove(mesh); liberarMemoriaMesh(mesh); }); 
                    delete perfilesCargados[nombre]; delete perfilesRawData[nombre];
                    if (activeProfileName === nombre) {
                        activeProfileName = null; dataProyeccion2D = null; currentRenderId++; isProcessing2D = false;
                        clickedPoint2D = null; laserMesh.visible = false; document.getElementById('laser-info').style.display = 'none';
                        document.getElementById('dpad-container').style.display = 'none'; isCursorActive = false;
                        document.getElementById('active-profile-title').innerText = "[Ninguno]";
                        ctx2D.fillStyle = '#0a0a0a'; ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);
                    }
                } else if (tipo === 'progresiva') {
                    delete progresivasCargadas[nombre];
                }
                
                div.remove();
                if (container.children.length === 0) container.innerHTML = `<div id="empty-list-msg" style="font-size: 12px; color: #555; text-align: center; padding: 15px; border: 1px dashed #333; border-radius: 6px;">Ningún archivo cargado</div>`;
                
                actualizarEstadoVinculoTXT(); 
            });
            container.appendChild(div);
        }

        init();
    </script>
</body>
</html>
