<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor Geofísico Bidimensional / Tridimensional</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --sidebar-bg: #1a1a1a;
            --border-color: #333333;
            --text-color: #e0e0e0;
            --accent-color: #00bcd4;
            --accent-hover: #008ba3;
            --danger-color: #ff5252;
            --sidebar-width: 320px;
        }
        
        body { margin: 0; overflow: hidden; background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text-color); }
        #main-wrapper { display: flex; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

        #sidebar { width: var(--sidebar-width); background: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: width 0.3s ease; position: relative; z-index: 20; flex-shrink: 0; }
        #sidebar.collapsed { width: 0; border-right: none; }
        #sidebar-content { padding: 20px; overflow-y: auto; flex-grow: 1; width: var(--sidebar-width); box-sizing: border-box; transition: opacity 0.2s ease; }
        #sidebar.collapsed #sidebar-content { opacity: 0; pointer-events: none; }

        #toggle-sidebar { position: absolute; top: 50%; right: -24px; transform: translateY(-50%); width: 24px; height: 60px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-left: none; border-radius: 0 8px 8px 0; color: var(--text-color); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 21; box-shadow: 4px 0 10px rgba(0,0,0,0.3); }
        #toggle-sidebar:hover { color: var(--accent-color); }

        #views-container { display: flex; flex-grow: 1; width: 0; flex-direction: row; }
        .viewport { position: relative; flex: 1; height: 100%; box-sizing: border-box; min-height: 0; min-width: 0; }
        
        #view-3d { border-right: 2px solid var(--border-color); }
        #view-2d { background-color: #0b0b0b; display: flex; flex-direction: column; transition: flex 0.3s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease; position: relative; }
        
        #canvas-3d { width: 100%; height: 100%; }
        #canvas-2d { flex-grow: 1; width: 100%; height: 100%; display: block; background-color: #0a0a0a; cursor: grab; outline: none; }
        #canvas-2d:active { cursor: grabbing; }
        
        h1 { font-size: 16px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        h2 { font-size: 11px; margin: 15px 0 8px 0; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .control-group { background: rgba(255, 255, 255, 0.03); border: 1px solid #2d2d2d; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
        label { display: block; font-size: 13px; margin-bottom: 8px; display: flex; align-items: center;}
        
        .input-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        input[type="color"] { flex-grow: 1; height: 30px; border: 1px solid #444; border-radius: 4px; cursor: pointer; background: #222; padding: 2px; }
        input[type="number"], input[type="range"] { background: #222; border: 1px solid #444; color: white; border-radius: 4px; padding: 6px; font-size: 12px; }
        input[type="range"] { width: 100%; accent-color: var(--accent-color); }
        
        .file-drop-zone { border: 1px dashed #555; border-radius: 8px; padding: 15px; text-align: center; background: rgba(0, 0, 0, 0.2); cursor: pointer; transition: all 0.3s ease; font-size: 12px; color: #bbb; }
        .file-drop-zone:hover { border-color: var(--accent-color); color: var(--accent-color); background: rgba(0, 188, 212, 0.05); }
        .file-input { display: none; }
        
        .layer-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.05); padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; font-size: 12px; border-left: 3px solid #555; transition: border-color 0.3s; }
        .layer-item.active-2d { background: rgba(0, 188, 212, 0.1); border-left-color: var(--accent-color); border-right: 2px solid var(--accent-color); }
        .layer-actions { display: flex; gap: 10px; align-items: center; }
        
        .btn-action { background: none; border: none; cursor: pointer; font-size: 13px; padding: 2px; opacity: 0.8; transition: opacity 0.2s; }
        .btn-action:hover { opacity: 1; }
        .btn-view-2d { color: #81c784; display: flex; align-items: center; gap: 4px; font-size: 11px; } 
        .btn-del { color: var(--danger-color); font-size: 16px; font-weight: bold;} 
        
        #view-2d-header { background-color: #1a1a1a; border-bottom: 1px solid var(--border-color); padding: 12px 20px; font-size: 13px; font-weight: bold; color: #ccc; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        
        #btn-toggle-2d { background: none; border: none; color: var(--accent-color); cursor: pointer; font-size: 14px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; transition: transform 0.3s ease, background 0.2s; }
        #btn-toggle-2d:hover { background: rgba(0, 188, 212, 0.2); }

        #toggle-2d-sidebar { position: absolute; top: 50%; right: 0; transform: translateY(-50%); width: 24px; height: 60px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-right: none; border-radius: 8px 0 0 8px; color: var(--text-color); cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 21; box-shadow: -4px 0 10px rgba(0,0,0,0.3); }
        #toggle-2d-sidebar:hover { color: var(--accent-color); }

        /* Botones de navegación entre perfiles */
        .btn-profile-nav {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #444;
            color: var(--text-color);
            border-radius: 4px;
            width: 26px;
            height: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: background 0.2s, color 0.2s;
            user-select: none;
        }
        .btn-profile-nav:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        #tooltip-2d { position: absolute; background: rgba(15, 15, 15, 0.95); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; pointer-events: none; font-size: 12px; font-family: monospace; display: none; z-index: 100; color: #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #tooltip-2d span.val { color: var(--accent-color); font-weight: bold; }

        #laser-info { 
            position: absolute; 
            bottom: 25px; 
            right: 25px; 
            background: rgba(20, 20, 20, 0.95); 
            border: 1px solid var(--danger-color); 
            padding: 12px 15px; 
            border-radius: 8px; 
            display: none; 
            font-size: 13px; 
            line-height: 1.4; 
            z-index: 100; 
            box-shadow: 0 4px 20px rgba(255, 82, 82, 0.15); 
            pointer-events: none; 
            max-width: 240px;
        }
        #laser-info span.val { color: #81c784; font-weight: bold; }

        #dpad-container { position: absolute; bottom: 25px; left: 25px; display: none; flex-direction: column; align-items: center; gap: 4px; background: rgba(15, 15, 15, 0.85); padding: 12px; border-radius: 50px; border: 1px solid #444; z-index: 100; user-select: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .dpad-row { display: flex; gap: 4px; }
        .dpad-btn { width: 34px; height: 34px; border-radius: 50%; background: #252525; color: var(--text-color); border: 1px solid #555; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .dpad-btn:hover { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }
        .dpad-btn:active { transform: scale(0.9); }
        #btn-center { font-size: 16px; background: #1a1a1a; color: var(--danger-color); }
        #btn-center:hover { background: var(--danger-color); color: white; border-color: var(--danger-color); }
        
        /* Controles de zoom 2D flotantes */
        #zoom-controls-2d {
            position: absolute;
            top: 60px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 101;
        }
        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: rgba(20, 20, 20, 0.85);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            backdrop-filter: blur(4px);
            user-select: none;
        }
        .zoom-btn:hover {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        @media (min-width: 769px) {
            #btn-toggle-2d { transform: rotate(-90deg); }
            #main-wrapper.is-2d-collapsed #view-2d { flex: 0 0 0px !important; width: 0px !important; opacity: 0; overflow: hidden; border-left: none; }
            #main-wrapper.is-2d-collapsed #toggle-2d-sidebar { display: flex; }
        }

        @media (max-width: 768px) {
            #views-container { flex-direction: column; }
            #view-3d { border-right: none; border-bottom: 2px solid var(--border-color); }
            #sidebar { position: absolute; height: 100vh; height: 100dvh; left: 0; top: 0; max-width: 85vw; z-index: 1000; box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
            #sidebar.collapsed { width: 0; border-right: none; box-shadow: none; }
            #sidebar-content { padding-bottom: 120px !important; }
            #btn-toggle-2d { transform: rotate(0deg); }
            #main-wrapper.is-2d-collapsed #view-2d { flex: 0 0 44px !important; height: 44px !important; overflow: hidden; }
            #main-wrapper.is-2d-collapsed #btn-toggle-2d { transform: rotate(180deg); }
            #view-2d-header { padding: 10px; font-size: 11px; }
            #active-profile-title { max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
            
            #dpad-container { display: none !important; }
            
            #laser-info { 
                bottom: 85px; 
                right: 15px; 
                padding: 10px 12px; 
                font-size: 11px; 
                max-width: 180px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.6);
                border-radius: 6px;
            }
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="main-wrapper">
        <!-- Menú lateral colapsado por defecto -->
        <div id="sidebar" class="collapsed">
            <div id="toggle-sidebar" title="Ocultar/Mostrar panel">▶</div>
            <div id="sidebar-content">
                <h1>Visor Geofísico</h1>
                
                <h2>Cargar Datos (.json)</h2>
                <div class="file-drop-zone" onclick="document.getElementById('file-loader').click()">
                    <span id="drop-text">Cargar archivos de Terreno o Perfil</span>
                    <input type="file" id="file-loader" class="file-input" accept=".json" multiple>
                </div>
                
                <h2>Control de Terreno</h2>
                <div class="control-group">
                    <label><input type="checkbox" id="chk-terreno" checked style="margin-right: 8px;"> Mostrar Terreno</label>
                    <label style="color: #ffb74d; margin-top: 8px; font-size: 12px;">
                        <input type="checkbox" id="chk-cortinas" checked style="margin-right: 8px;"> Cortinas Transparentes
                    </label>
                    
                    <div class="input-row" style="margin-top:12px;">
                        <label style="margin:0; width:65px;">Color:</label>
                        <input type="color" id="color-terreno" value="#304120">
                    </div>
                    <div class="input-row" style="margin-top:12px;">
                        <label style="margin:0; width:65px;">Opacidad:</label>
                        <input type="range" id="opacity-terreno" min="0" max="1" step="0.05" value="0.70">
                    </div>
                </div>
                
                <h2>Límite de Altura Z</h2>
                <div class="control-group">
                    <label style="margin-bottom:8px; font-size:11px; color:#aaa;">Recorta caras por debajo de Z:</label>
                    <input type="number" id="z-limit-input" value="3000" step="10" style="width: 100%; box-sizing: border-box;">
                </div>
                
                <h2>Elementos Activos</h2>
                <div id="lista-capas" style="flex-grow: 1;">
                    <div id="empty-list-msg" style="font-size: 12px; color: #555; text-align: center; padding: 15px; border: 1px dashed #333; border-radius: 6px;">Ningún archivo cargado</div>
                </div>
            </div>
        </div>

        <div id="views-container">
            <div id="view-3d" class="viewport">
                <div id="canvas-3d"></div>
            </div>

            <div id="toggle-2d-sidebar" title="Mostrar Vista 2D">▶</div>

            <div id="view-2d" class="viewport">
                <div id="view-2d-header">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button id="btn-toggle-2d" title="Ocultar/Mostrar panel 2D">▼</button>
                        <span>SECCIÓN GEOFÍSICA (2D)</span>
                    </div>

                    <!-- Navegación directa entre perfiles mediante flechitas -->
                    <div style="display:flex; align-items:center; gap:6px;">
                        <button id="btn-prev-profile" class="btn-profile-nav" title="Perfil Anterior">◀</button>
                        <span id="active-profile-title" style="color: var(--accent-color); font-size:12px; font-weight:bold;">[Ninguno]</span>
                        <button id="btn-next-profile" class="btn-profile-nav" title="Perfil Siguiente">▶</button>
                    </div>
                </div>
                
                <!-- Botones flotantes de zoom para 2D -->
                <div id="zoom-controls-2d">
                    <button class="zoom-btn" id="btn-zoom-in" title="Acercar">+</button>
                    <button class="zoom-btn" id="btn-zoom-out" title="Alejar">-</button>
                    <button class="zoom-btn" id="btn-zoom-reset" title="Restaurar escala">R</button>
                </div>

                <canvas id="canvas-2d" tabindex="0"></canvas>
                <div id="tooltip-2d"></div>
                <div id="laser-info"></div>
                
                <div id="dpad-container">
                    <div class="dpad-row"><button class="dpad-btn" id="btn-up">▲</button></div>
                    <div class="dpad-row">
                        <button class="dpad-btn" id="btn-left">◀</button>
                        <button class="dpad-btn" id="btn-center" title="Fijar Punto (Enter)">🎯</button>
                        <button class="dpad-btn" id="btn-right">▶</button>
                    </div>
                    <div class="dpad-row"><button class="dpad-btn" id="btn-down">▼</button></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let terrenoMesh = null;
        let terrenoCrudoData = null; 
        let nombreArchivoTerreno = null; 
        const perfilesCargados = {}; 
        const perfilesRawData = {}; 
        let centerOffset = null; 
        let activeProfileName = null; 

        let canvas2D, ctx2D, tooltip2D;
        let dataProyeccion2D = null; 
        let isProcessing2D = false;
        let currentRenderId = 0; 
        let clickedPoint2D = null; 
        let laserMesh = null; 

        let cursorX = -1000, cursorY = -1000;
        let cursorMundoS = 0, cursorMundoZ = 0;
        let isCursorActive = false;

        let zoom2D = 1.0;
        let panX = 0;
        let panY = 0;

        const rawMeshCanvas = document.createElement('canvas');
        const ctxRaw = rawMeshCanvas.getContext('2d', { alpha: true });
        let escalaRaw = 1;
        
        const canvas2DCache = document.createElement('canvas');
        const ctxCache = canvas2DCache.getContext('2d', { alpha: false });
        
        let transX = 0, transY = 0, escalaGlobal = 1, minZ_grid = 0;
        const dpr = Math.min(window.devicePixelRatio || 1, 2); 

        function init() {
            const container = document.getElementById('canvas-3d');
            canvas2D = document.getElementById('canvas-2d');
            ctx2D = canvas2D.getContext('2d', { alpha: false });
            tooltip2D = document.getElementById('tooltip-2d');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            const ch = container.clientHeight || window.innerHeight;
            const cw = container.clientWidth || window.innerWidth / 2;
            camera = new THREE.PerspectiveCamera(45, cw / ch, 1, 100000);
            camera.position.set(500, -800, 500);
            camera.up.set(0, 0, 1); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(cw, ch);
            renderer.setPixelRatio(dpr);
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight.position.set(2000, 2000, 10000);
            scene.add(dirLight);

            const gridHelper = new THREE.GridHelper(10000, 100, 0x333333, 0x1a1a1a);
            gridHelper.rotation.x = Math.PI / 2;
            scene.add(gridHelper);

            // Esfera láser 3D clásica brillante sin oclusión
            const sg = new THREE.SphereGeometry(1, 16, 16);
            const sm = new THREE.MeshBasicMaterial({color: 0xff1744, depthTest: false});
            laserMesh = new THREE.Mesh(sg, sm);
            laserMesh.renderOrder = 999;
            laserMesh.visible = false;
            scene.add(laserMesh);

            vincularEventosUI();
            animate();
            setTimeout(onWindowResize, 100);

            cargarDatosPreestablecidos();
        }

        async function cargarDatosPreestablecidos() {
            try {
                const resTerreno = await fetch('terreno_web.json');
                if (resTerreno.ok) {
                    const dataTerreno = await resTerreno.json();
                    terrenoCrudoData = dataTerreno;
                    nombreArchivoTerreno = "terreno_web.json";
                    construirTerreno(dataTerreno, "terreno_web.json");
                }
            } catch (e) {
                console.warn("Autocarga de terreno omitida:", e);
            }

            const nombresPerfiles = ['Perfil1.json', 'Perfil2.json', 'Perfil3.json', 'Perfil4.json'];
            let primerPerfilCargado = null;
            let nombrePrimerPerfil = "";

            for (const nombre of nombresPerfiles) {
                try {
                    const resPerfil = await fetch(nombre);
                    if (resPerfil.ok) {
                        const dataPerfil = await resPerfil.json();
                        construirPerfil(dataPerfil, nombre);
                        
                        if (!primerPerfilCargado) {
                            primerPerfilCargado = dataPerfil;
                            nombrePrimerPerfil = nombre;
                        }
                    }
                } catch (e) {
                    console.warn(`Error al cargar ${nombre}:`, e);
                }
            }

            if (primerPerfilCargado) {
                activarPerfil2D(nombrePrimerPerfil, primerPerfilCargado);
            }
        }

        function toggle2DPanel() {
            document.getElementById('main-wrapper').classList.toggle('is-2d-collapsed');
            setTimeout(onWindowResize, 310);
        }

        function cambiarPerfilSiguiente(direccion) {
            const nombres = Object.keys(perfilesRawData);
            if (nombres.length === 0) return;
            let idx = nombres.indexOf(activeProfileName);
            if (idx === -1) {
                idx = 0;
            } else {
                idx = (idx + direccion + nombres.length) % nombres.length;
            }
            const nuevoNombre = nombres[idx];
            if (nuevoNombre && perfilesRawData[nuevoNombre]) {
                activarPerfil2D(nuevoNombre, perfilesRawData[nuevoNombre]);
            }
        }

        function vincularEventosUI() {
            const bindEvent = (id, event, callback) => {
                const el = document.getElementById(id);
                if (el) el.addEventListener(event, callback);
            }

            bindEvent('toggle-sidebar', 'click', () => {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.toggle('collapsed');
                document.getElementById('toggle-sidebar').innerText = sidebar.classList.contains('collapsed') ? '▶' : '◀';
                setTimeout(onWindowResize, 310);
            });

            bindEvent('btn-toggle-2d', 'click', toggle2DPanel);
            bindEvent('toggle-2d-sidebar', 'click', toggle2DPanel);

            // Botones de cambio directo de perfil
            bindEvent('btn-prev-profile', 'click', () => cambiarPerfilSiguiente(-1));
            bindEvent('btn-next-profile', 'click', () => cambiarPerfilSiguiente(1));

            bindEvent('chk-terreno', 'change', (e) => { if (terrenoMesh) terrenoMesh.visible = e.target.checked; });
            
            bindEvent('color-terreno', 'input', (e) => { 
                if (terrenoMesh) { 
                    if (Array.isArray(terrenoMesh.material)) {
                        terrenoMesh.material[0].color.set(e.target.value);
                        terrenoMesh.material[1].color.set(e.target.value);
                    } else {
                        terrenoMesh.material.color.set(e.target.value); 
                    }
                } 
            });

            bindEvent('opacity-terreno', 'input', (e) => { 
                if (terrenoMesh) { 
                    const val = parseFloat(e.target.value);
                    if (Array.isArray(terrenoMesh.material)) {
                        terrenoMesh.material[0].opacity = val;
                        if (!document.getElementById('chk-cortinas').checked) {
                            terrenoMesh.material[1].opacity = val;
                        }
                    } else {
                        terrenoMesh.material.opacity = val; 
                    }
                } 
            });
            
            bindEvent('chk-cortinas', 'change', (e) => { 
                if (terrenoMesh && Array.isArray(terrenoMesh.material)) {
                    const cortinasTransparentes = e.target.checked;
                    terrenoMesh.material[1].opacity = cortinasTransparentes ? 0.05 : parseFloat(document.getElementById('opacity-terreno').value);
                    terrenoMesh.material[1].depthWrite = !cortinasTransparentes;
                }
            });

            bindEvent('z-limit-input', 'change', () => { 
                if (terrenoCrudoData) construirTerreno(terrenoCrudoData, nombreArchivoTerreno || "Terreno"); 
            });

            bindEvent('file-loader', 'change', (e) => {
                const files = e.target.files;
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (data.tipo === "terreno") {
                                terrenoCrudoData = data; nombreArchivoTerreno = file.name;
                                construirTerreno(data, file.name);
                            } else if (Array.isArray(data)) {
                                construirPerfil(data, file.name);
                            }
                        } catch (err) { alert("Error al procesar el archivo: " + err.message); }
                    };
                    reader.readAsText(file);
                }
                e.target.value = '';
            });

            window.addEventListener('resize', onWindowResize);
            
            const isMobile = window.innerWidth <= 768;
            const factorBoton = isMobile ? 1.2 : 1.3;

            bindEvent('btn-zoom-in', 'click', () => {
                zoom2D = Math.min(30, zoom2D * factorBoton);
                reconstruirCacheScreen();
                if (isCursorActive) updateCursor2D();
            });
            bindEvent('btn-zoom-out', 'click', () => {
                zoom2D = Math.max(0.5, zoom2D / factorBoton);
                reconstruirCacheScreen();
                if (isCursorActive) updateCursor2D();
            });
            bindEvent('btn-zoom-reset', 'click', () => {
                zoom2D = 1.0;
                panX = 0;
                panY = 0;
                reconstruirCacheScreen();
                if (isCursorActive) updateCursor2D();
            });
            
            if (canvas2D) {
                let isDragging2D = false;
                let startDragX = 0, startDragY = 0;
                let originalPanX = 0, originalPanY = 0;
                let dragMoved = false;
                let touchStartDist = 0;
                let isPinchZooming = false;

                canvas2D.addEventListener('wheel', (e) => {
                    if (!dataProyeccion2D) return;
                    e.preventDefault();
                    const zoomFactor = e.deltaY < 0 ? 1.15 : 0.85;
                    zoom2D = Math.max(0.5, Math.min(30, zoom2D * zoomFactor));
                    reconstruirCacheScreen();
                    if (isCursorActive) updateCursor2D();
                }, { passive: false });

                canvas2D.addEventListener('mousedown', (e) => {
                    if (!dataProyeccion2D) return;
                    isDragging2D = true;
                    const rect = canvas2D.getBoundingClientRect();
                    startDragX = e.clientX - rect.left;
                    startDragY = e.clientY - rect.top;
                    originalPanX = panX;
                    originalPanY = panY;
                    dragMoved = false;
                });

                canvas2D.addEventListener('mousemove', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();
                    const curX = e.clientX - rect.left;
                    const curY = e.clientY - rect.top;

                    if (isDragging2D) {
                        const dx = curX - startDragX;
                        const dy = curY - startDragY;
                        if (Math.hypot(dx, dy) > 4) {
                            dragMoved = true;
                            panX = originalPanX + dx;
                            panY = originalPanY + dy;
                            reconstruirCacheScreen();
                        }
                    } else {
                        cursorX = curX;
                        cursorY = curY;
                        isCursorActive = true;
                        updateCursor2D();
                    }
                });

                canvas2D.addEventListener('mouseup', (e) => {
                    if (isDragging2D) {
                        isDragging2D = false;
                        if (!dragMoved) {
                            triggerCursorClick();
                        }
                    }
                });

                canvas2D.addEventListener('mouseleave', () => { 
                    isDragging2D = false;
                    isCursorActive = false;
                    if (tooltip2D) tooltip2D.style.display = 'none'; 
                    dibu2D(); 
                });

                canvas2D.addEventListener('touchstart', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();
                    isDragging2D = true;
                    dragMoved = false;

                    if (e.touches.length === 1) {
                        isPinchZooming = false;
                        startDragX = e.touches[0].clientX - rect.left;
                        startDragY = e.touches[0].clientY - rect.top;
                        originalPanX = panX;
                        originalPanY = panY;
                    } else if (e.touches.length === 2) {
                        isPinchZooming = true;
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        touchStartDist = Math.hypot(dx, dy);
                    }
                }, { passive: true });

                canvas2D.addEventListener('touchmove', (e) => {
                    if (!dataProyeccion2D) return;
                    const rect = canvas2D.getBoundingClientRect();

                    if (isPinchZooming && e.touches.length === 2) {
                        e.preventDefault();
                        const dx = e.touches[0].clientX - e.touches[1].clientX;
                        const dy = e.touches[0].clientY - e.touches[1].clientY;
                        const currentDist = Math.hypot(dx, dy);
                        if (touchStartDist > 0) {
                            const factor = currentDist / touchStartDist;
                            const dampFactor = 1 + (factor - 1) * 0.65; 
                            zoom2D = Math.max(0.5, Math.min(30, zoom2D * dampFactor));
                            touchStartDist = currentDist;
                            reconstruirCacheScreen();
                        }
                    } else if (isDragging2D && e.touches.length === 1) {
                        e.preventDefault();
                        const curX = e.touches[0].clientX - rect.left;
                        const curY = e.touches[0].clientY - rect.top;
                        const dx = curX - startDragX;
                        const dy = curY - startDragY;

                        if (Math.hypot(dx, dy) > 5) {
                            dragMoved = true;
                            panX = originalPanX + dx;
                            panY = originalPanY + dy;
                            reconstruirCacheScreen();
                        }
                    }
                }, { passive: false });

                canvas2D.addEventListener('touchend', (e) => {
                    if (isDragging2D) {
                        isDragging2D = false;
                        if (!dragMoved && !isPinchZooming) {
                            const rect = canvas2D.getBoundingClientRect();
                            if (e.changedTouches.length > 0) {
                                cursorX = e.changedTouches[0].clientX - rect.left;
                                cursorY = e.changedTouches[0].clientY - rect.top;
                                isCursorActive = true;
                                triggerCursorClick();
                            }
                        }
                        isPinchZooming = false;
                    }
                });

                window.addEventListener('keydown', (e) => {
                    if (!dataProyeccion2D || isProcessing2D || !isCursorActive) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName)) return;

                    const logicalW = canvas2D.width / dpr;
                    const logicalH = canvas2D.height / dpr;
                    let step = e.shiftKey ? 10 : 1;
                    let moved = false;
                    
                    switch (e.key) {
                        case 'ArrowLeft': cursorX -= step; moved = true; break;
                        case 'ArrowRight': cursorX += step; moved = true; break;
                        case 'ArrowUp': cursorY -= step; moved = true; break;
                        case 'ArrowDown': cursorY += step; moved = true; break;
                        case 'Enter': 
                        case ' ': triggerCursorClick(); e.preventDefault(); return;
                    }
                    if (moved) {
                        cursorX = Math.max(0, Math.min(logicalW, cursorX));
                        cursorY = Math.max(0, Math.min(logicalH, cursorY));
                        updateCursor2D(); e.preventDefault();
                    }
                });
            }

            let dpadInterval;
            const startMove = (dx, dy) => {
                const logicalW = canvas2D.width / dpr;
                const logicalH = canvas2D.height / dpr;
                if(!isCursorActive) { cursorX = logicalW/2; cursorY = logicalH/2; isCursorActive = true; }
                const move = () => { cursorX = Math.max(0, Math.min(logicalW, cursorX+dx)); cursorY = Math.max(0, Math.min(logicalH, cursorY+dy)); updateCursor2D(); };
                move();
                dpadInterval = setInterval(move, 50);
            };
            const stopMove = () => clearInterval(dpadInterval);
            const bindDpad = (id, dx, dy) => {
                const el = document.getElementById(id);
                el.addEventListener('mousedown', () => startMove(dx, dy));
                el.addEventListener('mouseup', stopMove);
                el.addEventListener('mouseleave', stopMove);
                
                el.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(dx, dy); }, {passive: false});
                el.addEventListener('touchend', stopMove);
            };
            bindDpad('btn-up', 0, -2); bindDpad('btn-down', 0, 2);
            bindDpad('btn-left', -2, 0); bindDpad('btn-right', 2, 0);
            
            const btnCenter = document.getElementById('btn-center');
            btnCenter.addEventListener('mousedown', triggerCursorClick);
            btnCenter.addEventListener('touchstart', (e) => { e.preventDefault(); triggerCursorClick(); }, {passive: false});
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        function onWindowResize() {
            const container = document.getElementById('canvas-3d');
            if (!container || container.clientWidth === 0 || container.clientHeight === 0) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
            resize2DCanvas();
        }

        function resize2DCanvas() {
            if (!canvas2D) return;
            const rect = canvas2D.parentElement.getBoundingClientRect();
            const headerH = document.getElementById('view-2d-header').offsetHeight;
            
            const logicalW = rect.width;
            let logicalH = rect.height - headerH;
            if (logicalH < 0) logicalH = 0;
            
            canvas2D.width = logicalW * dpr;
            canvas2D.height = logicalH * dpr;
            canvas2D.style.width = `${logicalW}px`;
            canvas2D.style.height = `${logicalH}px`;
            
            if (logicalH > 0) {
                if (!isProcessing2D && dataProyeccion2D) {
                    reconstruirCacheScreen(); 
                } else if (!dataProyeccion2D) {
                    ctx2D.fillStyle = '#0a0a0a';
                    ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);
                }
            }
        }

        function obtenerOffset(vertices) {
            if (centerOffset === null && vertices && vertices.length >= 3) {
                let sumX = 0, sumY = 0, sumZ = 0, count = 0;
                for (let i = 0; i < vertices.length; i += 3) { 
                    if (Number.isFinite(vertices[i]) && Number.isFinite(vertices[i+1]) && Number.isFinite(vertices[i+2])) {
                        sumX += vertices[i]; sumY += vertices[i+1]; sumZ += vertices[i+2]; count++;
                    }
                }
                if (count > 0) {
                    centerOffset = new THREE.Vector3(sumX / count, sumY / count, sumZ / count);
                } else {
                    centerOffset = new THREE.Vector3(0, 0, 0);
                }
            }
        }

        function liberarMemoriaMesh(mesh) {
            if (!mesh) return;
            if (mesh.geometry) mesh.geometry.dispose();
            if (mesh.material) {
                if (Array.isArray(mesh.material)) mesh.material.forEach(m => m.dispose());
                else mesh.material.dispose();
            }
        }

        function construirTerreno(data, nombreArchivo) {
            const inputVal = parseFloat(document.getElementById('z-limit-input').value);
            const zLimite = isNaN(inputVal) ? -999999 : inputVal;

            const carasSuperficie = [];
            const carasCortina = [];
            const numVertices = data.vertices.length / 3;

            for (let i = 0; i < data.caras.length; i += 3) {
                let idx1 = data.caras[i];
                let idx2 = data.caras[i+1];
                let idx3 = data.caras[i+2];

                if (idx1 >= numVertices || idx2 >= numVertices || idx3 >= numVertices) continue;

                let x1 = data.vertices[idx1 * 3],     y1 = data.vertices[idx1 * 3 + 1], z1 = data.vertices[idx1 * 3 + 2];
                let x2 = data.vertices[idx2 * 3],     y2 = data.vertices[idx2 * 3 + 1], z2 = data.vertices[idx2 * 3 + 2];
                let x3 = data.vertices[idx3 * 3],     y3 = data.vertices[idx3 * 3 + 1], z3 = data.vertices[idx3 * 3 + 2];
                
                if (Number.isFinite(z1) && Number.isFinite(z2) && Number.isFinite(z3)) {
                    if (z1 >= zLimite && z2 >= zLimite && z3 >= zLimite) {
                        let esParedVertical = false;
                        
                        let ux = x2 - x1, uy = y2 - y1, uz = z2 - z1;
                        let vx = x3 - x1, vy = y3 - y1, vz = z3 - z1;
                        
                        let nx = (uy * vz) - (uz * vy);
                        let ny = (uz * vx) - (ux * vz);
                        let nz = (ux * vy) - (uy * vx);
                        
                        let length = Math.sqrt(nx*nx + ny*ny + nz*nz);
                        if (length > 0) {
                            let normalizedNz = Math.abs(nz / length);
                            if (normalizedNz < 0.15) { 
                                esParedVertical = true;
                            }
                        }

                        if (esParedVertical) {
                            carasCortina.push(idx1, idx2, idx3);
                        } else {
                            carasSuperficie.push(idx1, idx2, idx3);
                        }
                    }
                }
            }

            if (carasSuperficie.length + carasCortina.length === 0) {
                alert("El límite Z es demasiado alto. Ajusta los parámetros para poder ver el terreno.");
                return;
            }

            let isFirstLoad = (terrenoMesh === null);

            if (terrenoMesh) { 
                scene.remove(terrenoMesh); 
                liberarMemoriaMesh(terrenoMesh); 
            }

            obtenerOffset(data.vertices);
            
            const indexMap = new Map();
            const verticesEmpaquetados = [];
            const carasSupEmpaquetadas = [];
            const carasCortEmpaquetadas = [];
            let indexCounter = 0;

            const procesarCara = (oldIdx, arrayDestino) => {
                if (!indexMap.has(oldIdx)) {
                    indexMap.set(oldIdx, indexCounter);
                    verticesEmpaquetados.push(
                        data.vertices[oldIdx * 3] - centerOffset.x,
                        data.vertices[oldIdx * 3 + 1] - centerOffset.y,
                        data.vertices[oldIdx * 3 + 2] - centerOffset.z
                    );
                    indexCounter++;
                }
                arrayDestino.push(indexMap.get(oldIdx));
            };

            for (let i = 0; i < carasSuperficie.length; i++) procesarCara(carasSuperficie[i], carasSupEmpaquetadas);
            for (let i = 0; i < carasCortina.length; i++) procesarCara(carasCortina[i], carasCortEmpaquetadas);

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verticesEmpaquetados), 3));
            
            const allIndices = new Uint32Array(carasSupEmpaquetadas.length + carasCortEmpaquetadas.length);
            allIndices.set(carasSupEmpaquetadas, 0);
            allIndices.set(carasCortEmpaquetadas, carasSupEmpaquetadas.length);
            
            geometry.setIndex(new THREE.BufferAttribute(allIndices, 1));
            
            geometry.addGroup(0, carasSupEmpaquetadas.length, 0);
            geometry.addGroup(carasSupEmpaquetadas.length, carasCortEmpaquetadas.length, 1);
            
            geometry.computeVertexNormals();
            geometry.computeBoundingSphere(); 

            const baseColor = document.getElementById('color-terreno').value;
            const baseOpacity = parseFloat(document.getElementById('opacity-terreno').value);
            const cortinasTrans = document.getElementById('chk-cortinas').checked;

            const matNormal = new THREE.MeshLambertMaterial({ 
                color: baseColor, transparent: true, opacity: baseOpacity, side: THREE.DoubleSide 
            });
            
            const matCortina = new THREE.MeshLambertMaterial({ 
                color: baseColor, transparent: true, 
                opacity: cortinasTrans ? 0.05 : baseOpacity, 
                depthWrite: !cortinasTrans,
                side: THREE.DoubleSide 
            });

            terrenoMesh = new THREE.Mesh(geometry, [matNormal, matCortina]);
            scene.add(terrenoMesh);
            
            if (isFirstLoad && geometry.boundingSphere && !isNaN(geometry.boundingSphere.center.x)) {
                controls.target.copy(geometry.boundingSphere.center);
                camera.position.set(
                    geometry.boundingSphere.center.x + 300, 
                    geometry.boundingSphere.center.y - 400, 
                    geometry.boundingSphere.center.z + 300
                );
            }
            
            actualizarUILista(nombreArchivo, 'terreno');
        }

        function construirPerfil(data, nombreArchivo) {
            if (perfilesCargados[nombreArchivo]) { perfilesCargados[nombreArchivo].forEach(m => { scene.remove(m); liberarMemoriaMesh(m); }); }
            if (data.length > 0 && data[0].vertices && data[0].vertices.length > 0) obtenerOffset(data[0].vertices);

            perfilesRawData[nombreArchivo] = data; // Guardamos datos puros para cambio directo por flechitas

            const meshes = [];
            const bboxGlobal = new THREE.Box3();

            data.forEach(capa => {
                const geometry = new THREE.BufferGeometry();
                const verticesModificados = new Float32Array(capa.vertices.length);
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    verticesModificados[i]   = Number.isFinite(capa.vertices[i]) ? (capa.vertices[i] - centerOffset.x) : 0;
                    verticesModificados[i+1] = Number.isFinite(capa.vertices[i+1]) ? (capa.vertices[i+1] - centerOffset.y) : 0;
                    verticesModificados[i+2] = Number.isFinite(capa.vertices[i+2]) ? (capa.vertices[i+2] - centerOffset.z) : 0;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(verticesModificados, 3));
                geometry.setIndex(new THREE.BufferAttribute(new Uint32Array(capa.caras), 1)); 
                geometry.computeVertexNormals(); 
                geometry.computeBoundingBox();
                
                if (geometry.boundingBox && !isNaN(geometry.boundingBox.min.x)) {
                    bboxGlobal.union(geometry.boundingBox);
                }

                // Renderizado 3D sólido original (sin alterar opacidad para ver a través del terreno)
                const mesh = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: capa.color, side: THREE.DoubleSide }));
                scene.add(mesh); meshes.push(mesh);
            });

            perfilesCargados[nombreArchivo] = meshes;
            actualizarUILista(nombreArchivo, 'perfil', data);
            
            if (!terrenoMesh && Object.keys(perfilesCargados).length === 1 && !bboxGlobal.isEmpty()) {
                const center = bboxGlobal.getCenter(new THREE.Vector3());
                if (!isNaN(center.x)) {
                    controls.target.copy(center);
                    camera.position.set(center.x + 150, center.y - 200, center.z + 150);
                }
            }
        }

        async function activarPerfil2D(nombre, data) {
            if (isProcessing2D) return; 
            
            document.getElementById('main-wrapper').classList.remove('is-2d-collapsed');
            setTimeout(onWindowResize, 310);

            isProcessing2D = true;
            currentRenderId++;
            const myRenderId = currentRenderId;

            activeProfileName = nombre;
            
            zoom2D = 1.0;
            panX = 0;
            panY = 0;

            const titleEl = document.getElementById('active-profile-title');
            titleEl.innerText = `[ Calculando... ]`;
            titleEl.style.color = "#ffb74d"; 

            const safeId = nombre.replace(/[^a-zA-Z0-9]/g, '_');
            document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active-2d'));
            const capDiv = document.getElementById(`capa-${safeId}`);
            if(capDiv) capDiv.classList.add('active-2d');

            clickedPoint2D = null;
            laserMesh.visible = false;
            document.getElementById('laser-info').style.display = 'none';
            document.getElementById('dpad-container').style.display = 'none';
            isCursorActive = false;

            await new Promise(r => setTimeout(r, 10));

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity, minZ = Infinity, maxZ = -Infinity;
            let pMinX = null, pMaxX = null, pMinY = null, pMaxY = null, countVertices = 0;

            data.forEach(capa => {
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    let vx = capa.vertices[i], vy = capa.vertices[i+1], vz = capa.vertices[i+2];
                    if (Number.isFinite(vx) && Number.isFinite(vy) && Number.isFinite(vz)) {
                        if (vx < minX) { minX = vx; pMinX = {x:vx, y:vy, z:vz}; }
                        if (vx > maxX) { maxX = vx; pMaxX = {x:vx, y:vy, z:vz}; }
                        if (vy < minY) { minY = vy; pMinY = {x:vx, y:vy, z:vz}; }
                        if (vy > maxY) { maxY = vy; pMaxY = {x:vx, y:vy, z:vz}; }
                        if (vz < minZ) minZ = vz;
                        if (vz > maxZ) maxZ = vz;
                        countVertices++;
                    }
                }
            });

            if (countVertices === 0) { isProcessing2D = false; return; }

            let pStart, pEnd;
            if ((maxX - minX) >= (maxY - minY)) { pStart = pMinX; pEnd = pMaxX; } 
            else { pStart = pMinY; pEnd = pMaxY; }

            const dirX = pEnd.x - pStart.x, dirY = pEnd.y - pStart.y;
            let longitudCuerda = Math.hypot(dirX, dirY);
            if (longitudCuerda === 0) longitudCuerda = 0.0001; 

            const uX = dirX / longitudCuerda, uY = dirY / longitudCuerda;
            let globalMinS = Infinity, globalMaxS = -Infinity;

            const estratosProyectados = [];
            data.forEach(capa => {
                const vertices2D = [];
                for (let i = 0; i < capa.vertices.length; i += 3) {
                    let vx = capa.vertices[i], vy = capa.vertices[i+1], vz = capa.vertices[i+2];
                    if (Number.isFinite(vx)) {
                        let s = (vx - pStart.x) * uX + (vy - pStart.y) * uY;
                        if (s < globalMinS) globalMinS = s;
                        if (s > globalMaxS) globalMaxS = s;
                        vertices2D.push({ s: s, z: vz });
                    } else {
                        vertices2D.push({ s: 0, z: 0 }); 
                    }
                }
                estratosProyectados.push({ color: capa.color, caras: capa.caras, vertices: vertices2D });
            });

            const rangeS = globalMaxS - globalMinS || 1;
            laserMesh.scale.setScalar(Math.max(rangeS * 0.015, 14)); 

            minZ_grid = Math.floor(minZ / 50) * 50;
            const maxZ_grid = Math.ceil(maxZ / 50) * 50;

            dataProyeccion2D = { estratos: estratosProyectados, longitud: rangeS, minS: globalMinS, maxS: globalMaxS, minZ: minZ, maxZ: maxZ, minZ_grid: minZ_grid, maxZ_grid: maxZ_grid, pStart: pStart, uX: uX, uY: uY };
            
            await generarRawMeshAsync(myRenderId);

            if (myRenderId === currentRenderId) {
                titleEl.innerText = nombre.replace(".json", "");
                titleEl.style.color = "var(--accent-color)";
                
                if (window.innerWidth > 768) {
                    document.getElementById('dpad-container').style.display = 'flex';
                }
                isProcessing2D = false;
            }
        }

        async function generarRawMeshAsync(renderId) {
            const rngS = Math.max(dataProyeccion2D.maxS - dataProyeccion2D.minS, 1);
            const rngZ = Math.max(dataProyeccion2D.maxZ_grid - dataProyeccion2D.minZ_grid, 1);

            rawMeshCanvas.width = 8192; 
            escalaRaw = rawMeshCanvas.width / rngS;
            rawMeshCanvas.height = Math.max(1, rngZ * escalaRaw);
            
            ctxRaw.clearRect(0, 0, rawMeshCanvas.width, rawMeshCanvas.height);
            
            let totalCaras = 0, carasProcesadas = 0;
            dataProyeccion2D.estratos.forEach(c => totalCaras += c.caras.length / 3);
            const titleEl = document.getElementById('active-profile-title');

            const CHUNK_FACES = 10000; 

            for (let capa of dataProyeccion2D.estratos) {
                if (renderId !== currentRenderId) return; 

                ctxRaw.fillStyle = capa.color;
                ctxRaw.strokeStyle = capa.color; 
                ctxRaw.lineWidth = 0.5;

                for (let i = 0; i < capa.caras.length; i += CHUNK_FACES * 3) {
                    ctxRaw.beginPath(); 
                    
                    let limit = Math.min(i + CHUNK_FACES * 3, capa.caras.length);
                    for (let j = i; j < limit; j += 3) {
                        const v0 = capa.vertices[capa.caras[j]];
                        const v1 = capa.vertices[capa.caras[j+1]];
                        const v2 = capa.vertices[capa.caras[j+2]];
                        if (!v0 || !v1 || !v2) continue;

                        let x0 = (v0.s - dataProyeccion2D.minS) * escalaRaw;
                        let y0 = rawMeshCanvas.height - (v0.z - dataProyeccion2D.minZ_grid) * escalaRaw;
                        let x1 = (v1.s - dataProyeccion2D.minS) * escalaRaw;
                        let y1 = rawMeshCanvas.height - (v1.z - dataProyeccion2D.minZ_grid) * escalaRaw;
                        let x2 = (v2.s - dataProyeccion2D.minS) * escalaRaw;
                        let y2 = rawMeshCanvas.height - (v2.z - dataProyeccion2D.minZ_grid) * escalaRaw;

                        ctxRaw.moveTo(x0, y0); ctxRaw.lineTo(x1, y1); ctxRaw.lineTo(x2, y2); ctxRaw.lineTo(x0, y0); 
                    }
                    ctxRaw.fill(); ctxRaw.stroke();

                    carasProcesadas += (limit - i) / 3;
                    reconstruirCacheScreen(); 
                    titleEl.innerText = `Renderizando [ ${Math.round((carasProcesadas / totalCaras) * 100)}% ]...`;
                    
                    await new Promise(resolve => requestAnimationFrame(resolve));
                    if (renderId !== currentRenderId) return;
                }
            }
            reconstruirCacheScreen(); 
        }

        function reconstruirCacheScreen() {
            if (!dataProyeccion2D || !canvas2D) return;
            
            canvas2DCache.width = canvas2D.width;
            canvas2DCache.height = canvas2D.height;
            
            ctxCache.fillStyle = "#0a0a0a";
            ctxCache.fillRect(0, 0, canvas2DCache.width, canvas2DCache.height);
            
            ctxCache.save();
            ctxCache.scale(dpr, dpr); 

            const logicalW = canvas2D.width / dpr;
            const logicalH = canvas2D.height / dpr;
            
            const isMobile = window.innerWidth <= 768;
            const paddingLeft = 60;
            const paddingRight = 60;
            const paddingTop = 40;
            const paddingBottom = isMobile ? 120 : 60;

            const w_canvas = logicalW - (paddingLeft + paddingRight);
            const h_canvas = logicalH - (paddingTop + paddingBottom);

            if (w_canvas <= 0 || h_canvas <= 0) { ctxCache.restore(); return; }

            const rngS = Math.max(dataProyeccion2D.maxS - dataProyeccion2D.minS, 1);
            const rngZ = Math.max(dataProyeccion2D.maxZ_grid - dataProyeccion2D.minZ_grid, 1);

            const baseEscala = Math.min(w_canvas / rngS, h_canvas / rngZ);
            escalaGlobal = baseEscala * zoom2D;
            
            transX = paddingLeft + (w_canvas - rngS * escalaGlobal) / 2 + panX;
            transY = paddingTop + (h_canvas + rngZ * escalaGlobal) / 2 + panY; 

            ctxCache.strokeStyle = "rgba(255, 255, 255, 0.1)";
            ctxCache.fillStyle = "#888888"; 
            ctxCache.font = "11px 'Segoe UI', Tahoma, sans-serif";
            
            let pasoS = rngS > 1000000 ? 100000 : rngS > 100000 ? 10000 : rngS > 20000 ? 2000 : rngS > 5000 ? 500 : rngS > 1000 ? 100 : 50;
            let pasoZ = rngZ > 1000000 ? 100000 : rngZ > 100000 ? 10000 : rngZ > 20000 ? 2000 : rngZ > 5000 ? 500 : rngZ > 1000 ? 100 : 50;

            for (let z = dataProyeccion2D.minZ_grid; z <= dataProyeccion2D.maxZ_grid; z += pasoZ) {
                let y = transY - (z - dataProyeccion2D.minZ_grid) * escalaGlobal;
                ctxCache.beginPath(); ctxCache.moveTo(transX, y); ctxCache.lineTo(transX + rngS * escalaGlobal, y); ctxCache.stroke();
                ctxCache.fillText(`${z}m`, transX - 50, y + 4);
            }
            
            let startS = Math.floor(dataProyeccion2D.minS / pasoS) * pasoS;
            for (let s = startS; s <= dataProyeccion2D.maxS; s += pasoS) {
                let x = transX + (s - dataProyeccion2D.minS) * escalaGlobal;
                ctxCache.beginPath(); ctxCache.moveTo(x, transY - rngZ * escalaGlobal); ctxCache.lineTo(x, transY + 10); ctxCache.stroke();
                
                ctxCache.save();
                ctxCache.translate(x, transY + 18);
                ctxCache.rotate(-Math.PI / 4); 
                ctxCache.textAlign = "right";
                ctxCache.textBaseline = "middle";
                ctxCache.fillText(`S:${Math.round(s)}m`, 0, 0);
                ctxCache.restore();
            }

            const screenWidth = rngS * escalaGlobal;
            const screenHeight = rngZ * escalaGlobal;
            ctxCache.drawImage(rawMeshCanvas, transX, transY - screenHeight, screenWidth, screenHeight);
            ctxCache.restore();
            dibu2D();
        }

        function dibu2D() {
            if (!canvas2D) return;
            ctx2D.fillStyle = '#0a0a0a';
            ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);

            if (dataProyeccion2D) {
                ctx2D.drawImage(canvas2DCache, 0, 0);

                if (clickedPoint2D) {
                    ctx2D.save();
                    ctx2D.scale(dpr, dpr);
                    const px = transX + (clickedPoint2D.s - dataProyeccion2D.minS) * escalaGlobal;
                    const py = transY - (clickedPoint2D.z - dataProyeccion2D.minZ_grid) * escalaGlobal;
                    ctx2D.strokeStyle = "#ff5252"; ctx2D.lineWidth = 2;
                    ctx2D.beginPath(); ctx2D.arc(px, py, 10, 0, Math.PI*2); ctx2D.stroke();
                    ctx2D.fillStyle = "#ff5252";
                    ctx2D.beginPath(); ctx2D.arc(px, py, 3, 0, Math.PI*2); ctx2D.fill();
                    ctx2D.restore();
                }
            }
        }

        function updateCursor2D() {
            if (!dataProyeccion2D || isProcessing2D || !isCursorActive) return;

            cursorMundoS = dataProyeccion2D.minS + (cursorX - transX) / escalaGlobal;
            cursorMundoZ = dataProyeccion2D.minZ_grid + (transY - cursorY) / escalaGlobal;

            dibu2D();

            if (cursorMundoS < dataProyeccion2D.minS || cursorMundoS > dataProyeccion2D.maxS) {
                tooltip2D.style.display = 'none'; return;
            }

            const logicalW = canvas2D.width / dpr;
            const logicalH = canvas2D.height / dpr;

            const isMobile = window.innerWidth <= 768;
            
            if (isMobile) {
                ctx2D.save();
                ctx2D.scale(dpr, dpr);

                ctx2D.strokeStyle = "rgba(0, 188, 212, 0.4)"; ctx2D.lineWidth = 1; ctx2D.setLineDash([4, 4]); 
                ctx2D.beginPath();
                ctx2D.moveTo(0, cursorY); ctx2D.lineTo(logicalW, cursorY);
                ctx2D.moveTo(cursorX, 0); ctx2D.lineTo(cursorX, logicalH); 
                ctx2D.stroke(); ctx2D.restore();

                tooltip2D.style.display = 'block';
                tooltip2D.style.left = `${cursorX + canvas2D.getBoundingClientRect().left + 15}px`; 
                tooltip2D.style.top = `${cursorY + canvas2D.getBoundingClientRect().top - 45}px`;
                tooltip2D.innerHTML = `S: <span class="val">${cursorMundoS.toFixed(1)} m</span><br>Z: <span class="val">${cursorMundoZ.toFixed(1)} m</span>`;
                return;
            }

            ctx2D.save();
            ctx2D.scale(dpr, dpr);

            ctx2D.strokeStyle = "rgba(0, 188, 212, 0.6)"; ctx2D.lineWidth = 1; ctx2D.setLineDash([4, 4]); 
            ctx2D.beginPath();
            ctx2D.moveTo(0, cursorY); ctx2D.lineTo(logicalW, cursorY);
            ctx2D.moveTo(cursorX, 0); ctx2D.lineTo(cursorX, logicalH); 
            ctx2D.stroke(); ctx2D.setLineDash([]); 

            const lupaRadius = 70; 
            const zoomLevel = 3;   
            
            ctx2D.beginPath(); ctx2D.arc(cursorX, cursorY, lupaRadius, 0, Math.PI * 2); ctx2D.clip();
            ctx2D.fillStyle = "#0a0a0a"; ctx2D.fill();

            ctx2D.imageSmoothingEnabled = false;

            const physCursorX = cursorX * dpr;
            const physCursorY = cursorY * dpr;
            const physLupaRadius = lupaRadius * dpr;

            const sx = physCursorX - (physLupaRadius / zoomLevel);
            const sy = physCursorY - (physLupaRadius / zoomLevel);
            const sWidth = (physLupaRadius * 2) / zoomLevel;
            const sHeight = (physLupaRadius * 2) / zoomLevel;
            
            ctx2D.drawImage(canvas2DCache, sx, sy, sWidth, sHeight, cursorX - lupaRadius, cursorY - lupaRadius, lupaRadius * 2, lupaRadius * 2);
            ctx2D.imageSmoothingEnabled = true;

            ctx2D.strokeStyle = "#00bcd4"; ctx2D.lineWidth = 1.5;
            ctx2D.beginPath();
            ctx2D.moveTo(cursorX - 10, cursorY); ctx2D.lineTo(cursorX + 10, cursorY);
            ctx2D.moveTo(cursorX, cursorY - 10); ctx2D.lineTo(cursorX, cursorY + 10);
            ctx2D.stroke();

            ctx2D.lineWidth = 3; ctx2D.strokeStyle = "#ffffff";
            ctx2D.beginPath(); ctx2D.arc(cursorX, cursorY, lupaRadius, 0, Math.PI * 2); ctx2D.stroke();
            ctx2D.restore();

            tooltip2D.style.display = 'block';
            tooltip2D.style.left = `${cursorX + canvas2D.getBoundingClientRect().left + lupaRadius + 10}px`; 
            tooltip2D.style.top = `${cursorY + canvas2D.getBoundingClientRect().top - 20}px`;
            tooltip2D.innerHTML = `S: <span class="val">${cursorMundoS.toFixed(1)} m</span><br>Z: <span class="val">${cursorMundoZ.toFixed(1)} m</span>`;
        }

        function triggerCursorClick() {
            if (!dataProyeccion2D || isProcessing2D || !isCursorActive) return;
            if (cursorMundoS < dataProyeccion2D.minS || cursorMundoS > dataProyeccion2D.maxS) return;

            clickedPoint2D = { s: cursorMundoS, z: cursorMundoZ };

            const xOrig = dataProyeccion2D.pStart.x + dataProyeccion2D.uX * cursorMundoS;
            const yOrig = dataProyeccion2D.pStart.y + dataProyeccion2D.uY * cursorMundoS;
            const xScene = xOrig - centerOffset.x;
            const yScene = yOrig - centerOffset.y;
            const zScene = cursorMundoZ - centerOffset.z;

            if (Number.isFinite(xScene) && Number.isFinite(yScene) && Number.isFinite(zScene)) {
                laserMesh.position.set(xScene, yScene, zScene);
                laserMesh.visible = true;
            }

            let profTerreno = "N/A";
            if (terrenoMesh && Number.isFinite(xScene)) {
                const raycaster = new THREE.Raycaster(new THREE.Vector3(xScene, yScene, 999999), new THREE.Vector3(0, 0, -1));
                const intersects = raycaster.intersectObject(terrenoMesh, false);
                if (intersects.length > 0) {
                    const diff = intersects[0].point.z - zScene;
                    profTerreno = diff >= 0 ? diff.toFixed(2) + " m" : "Por encima del terreno";
                } else profTerreno = "Fuera de los límites";
            } else profTerreno = "Terreno no cargado";

            const laserInfo = document.getElementById('laser-info');
            laserInfo.style.display = 'block';

            const isMobile = window.innerWidth <= 768;

            if (isMobile) {
                laserInfo.innerHTML = `
                    <div style="color:var(--danger-color); font-weight:bold; font-size:10px; margin-bottom:2px; letter-spacing:0.5px;">📍 PUNTO SELECCIONADO</div>
                    <div style="font-size:12px; font-weight:bold; line-height:1.2;">Profundidad al Terreno:<br><span style="color:#81c784; font-size:15px; font-weight:900;">${profTerreno}</span></div>
                    <div style="font-size:9px; color:#aaa; margin-top:4px; border-top:1px solid #333; padding-top:4px;">Progresiva S: ${cursorMundoS.toFixed(1)} m</div>
                `;
            } else {
                laserInfo.innerHTML = `<div style="color:var(--danger-color); font-weight:bold; margin-bottom:8px; border-bottom:1px solid #444; padding-bottom:5px; font-size:11px;">📍 PUNTO SELECCIONADO</div>
                    Prof. al Terreno: <span class="val" style="font-size:14px; color:#81c784;">${profTerreno}</span><br>
                    Progresiva S: <span class="val">${cursorMundoS.toFixed(2)} m</span><br>
                    Elevación Z: <span class="val">${cursorMundoZ.toFixed(2)} m</span>`;
            }

            updateCursor2D();
        }

        function actualizarUILista(nombre, tipo, rawData = null) {
            const container = document.getElementById('lista-capas');
            const emptyMsg = document.getElementById('empty-list-msg');
            if (emptyMsg) emptyMsg.remove();
            const safeId = nombre.replace(/[^a-zA-Z0-9]/g, '_');
            if (document.getElementById(`capa-${safeId}`)) return;

            const div = document.createElement('div');
            div.id = `capa-${safeId}`; div.className = 'layer-item';
            div.innerHTML = `
                <label style="margin:0; cursor:pointer; display:flex; align-items:center;">
                    <input type="checkbox" checked id="chk-vis-${safeId}" style="margin-right: 8px; accent-color: var(--accent-color);">
                    <span style="word-break: break-all; max-width: 130px; font-weight:600; color:#ddd;">${nombre.replace(".json", "")}</span>
                </label>
                <div class="layer-actions">
                    ${tipo === 'perfil' ? `<button class="btn-action btn-view-2d" title="Generar proyección 2D">👁️ Vista 2D</button>` : ''}
                    <button class="btn-action btn-del" title="Eliminar archivo">&times;</button>
                </div>`;

            div.querySelector(`#chk-vis-${safeId}`).addEventListener('change', (e) => {
                if (tipo === 'terreno' && terrenoMesh) { terrenoMesh.visible = e.target.checked; document.getElementById('chk-terreno').checked = e.target.checked; } 
                else if (tipo === 'perfil' && perfilesCargados[nombre]) { perfilesCargados[nombre].forEach(mesh => mesh.visible = e.target.checked); }
            });

            if (tipo === 'perfil') div.querySelector('.btn-view-2d').addEventListener('click', () => activarPerfil2D(nombre, rawData));

            div.querySelector('.btn-del').addEventListener('click', () => {
                if (tipo === 'terreno' && terrenoMesh) { scene.remove(terrenoMesh); liberarMemoriaMesh(terrenoMesh); terrenoMesh = null; terrenoCrudoData = null; nombreArchivoTerreno = null; } 
                else if (tipo === 'perfil' && perfilesCargados[nombre]) {
                    perfilesCargados[nombre].forEach(mesh => { scene.remove(mesh); liberarMemoriaMesh(mesh); }); delete perfilesCargados[nombre]; delete perfilesRawData[nombre];
                    if (activeProfileName === nombre) {
                        activeProfileName = null; dataProyeccion2D = null; currentRenderId++; isProcessing2D = false;
                        clickedPoint2D = null; laserMesh.visible = false; document.getElementById('laser-info').style.display = 'none';
                        document.getElementById('dpad-container').style.display = 'none'; isCursorActive = false;
                        document.getElementById('active-profile-title').innerText = "[Ninguno]";
                        ctx2D.fillStyle = '#0a0a0a'; ctx2D.fillRect(0, 0, canvas2D.width, canvas2D.height);
                    }
                }
                div.remove();
                if (container.children.length === 0) container.innerHTML = `<div id="empty-list-msg" style="font-size: 12px; color: #555; text-align: center; padding: 15px; border: 1px dashed #333; border-radius: 6px;">Ningún archivo cargado</div>`;
            });
            container.appendChild(div);
        }

        init();
    </script>
